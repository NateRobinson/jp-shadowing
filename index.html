<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文化初級日本語 I — シャドーイング</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #fff; --fg: #000; --fg2: #888; --fg3: #ccc;
  --card: #f8f8f8; --border: #000; --border2: #ddd;
  --active-bg: #000; --active-fg: #fff;
  --bar-bg: #eee; --bar-fill: #000;
  --ruby: #999; --cn: #999;
  --nav-bg: #f5f5f5; --nav-hover: #e8e8e8;
}
[data-theme="dark"] {
  --bg: #0a0a0a; --fg: #e0e0e0; --fg2: #666; --fg3: #333;
  --card: #151515; --border: #e0e0e0; --border2: #262626;
  --active-bg: #e0e0e0; --active-fg: #0a0a0a;
  --bar-bg: #222; --bar-fill: #e0e0e0;
  --ruby: #555; --cn: #555;
  --nav-bg: #111; --nav-hover: #1a1a1a;
}

body {
  font-family: "SF Mono", "Menlo", "Consolas", monospace;
  background: var(--bg); color: var(--fg);
  line-height: 1.7; -webkit-font-smoothing: antialiased;
  transition: background .2s, color .2s;
}

/* Layout */
.app { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar {
  width: 280px; flex-shrink: 0;
  background: var(--nav-bg); border-right: 2px solid var(--border);
  overflow-y: auto; position: fixed; top: 0; bottom: 0; left: 0;
  transition: transform .25s, background .2s;
  z-index: 200;
}
.sidebar-header {
  padding: 16px; border-bottom: 2px solid var(--border);
  font-size: 14px; font-weight: 700; letter-spacing: 1px;
}
.sidebar-header span {
  font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  font-size: 13px; display: block; margin-top: 4px; font-weight: 500; color: var(--fg2);
}
.nav-group { border-bottom: 1px solid var(--border2); }
.nav-group-title {
  font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  font-size: 13px; font-weight: 700; padding: 10px 16px 4px;
  color: var(--fg2); letter-spacing: 1px;
}
.nav-item {
  display: block; width: 100%; text-align: left;
  font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  font-size: 14px; padding: 6px 16px 6px 24px;
  border: none; background: none; color: var(--fg);
  cursor: pointer; transition: background .1s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.nav-item:hover { background: var(--nav-hover); }
.nav-item.active { background: var(--active-bg); color: var(--active-fg); font-weight: 700; }

/* Main */
.main { flex: 1; margin-left: 280px; }
.container { max-width: 640px; margin: 0 auto; padding: 16px; }

/* Mobile hamburger */
.btn-menu {
  display: none; position: fixed; top: 12px; left: 12px; z-index: 300;
  width: 36px; height: 36px; border: 2px solid var(--border);
  background: var(--bg); color: var(--fg); font-size: 18px;
  cursor: pointer; align-items: center; justify-content: center;
  font-family: inherit;
}
.overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 150;
}

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .overlay.open { display: block; }
  .main { margin-left: 0; }
  .btn-menu { display: flex; }
  .lesson-header { padding-left: 44px; }
}

/* Header */
.lesson-header { padding: 16px 0 20px; margin-bottom: 24px; }
.lesson-header-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.lesson-tag {
  display: inline-block; background: var(--fg); color: var(--bg);
  font-size: 14px; font-weight: 700; padding: 6px 16px;
  letter-spacing: 1px;
}
.header-btns { display: flex; gap: 6px; }
.btn-theme, .btn-nav-arrow {
  padding: 4px 10px; border: 1.5px solid var(--border); background: var(--bg);
  color: var(--fg); font-size: 12px; cursor: pointer;
  font-family: inherit; transition: all .15s;
}
.btn-theme:hover, .btn-nav-arrow:hover { background: var(--fg); color: var(--bg); }
.btn-nav-arrow:disabled { opacity: 0.3; cursor: default; }
.btn-nav-arrow:disabled:hover { background: var(--bg); color: var(--fg); }
.lesson-title {
  font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  font-size: 28px; font-weight: 800; margin-bottom: 8px; line-height: 1.4;
}
.lesson-meta {
  font-size: 13px; color: var(--fg2);
  border-bottom: 2px solid var(--fg); padding-bottom: 16px;
}

/* Player */
.player {
  border: 2px solid var(--fg); padding: 14px; margin-bottom: 24px;
  transition: border-color .2s;
  position: sticky; top: 0; z-index: 100; background: var(--bg);
}
.player-main { display: flex; align-items: center; gap: 10px; }
.btn-play {
  width: 40px; height: 40px;
  border: 2px solid var(--fg); background: var(--bg); color: var(--fg);
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .1s; flex-shrink: 0;
}
.btn-play:hover { background: var(--fg); color: var(--bg); }
.progress-wrap { flex: 1; }
.progress-bar {
  position: relative; height: 8px; background: var(--bar-bg);
  cursor: pointer; overflow: visible;
}
.progress-fill {
  height: 100%; background: var(--bar-fill); width: 0%;
  pointer-events: none; position: relative;
}
.ab-region {
  position: absolute; top: 0; height: 100%;
  background: rgba(128,128,128,0.25); pointer-events: none; display: none;
}
.ab-marker {
  position: absolute; top: -4px; width: 3px; height: 16px;
  background: var(--fg); pointer-events: none; display: none;
}
.time-display {
  display: flex; justify-content: space-between;
  font-size: 12px; color: var(--fg2); margin-top: 4px;
  font-variant-numeric: tabular-nums;
}
.player-controls {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 6px; margin-top: 10px;
  padding-top: 10px; border-top: 1px solid var(--border2);
}
.speed-group { display: flex; gap: 2px; }
.btn-speed {
  padding: 3px 8px; border: 1px solid var(--border2); background: var(--bg);
  font-size: 12px; cursor: pointer; color: var(--fg2);
  font-family: inherit; transition: all .1s;
}
.btn-speed.active { background: var(--active-bg); color: var(--active-fg); border-color: var(--active-bg); }
.toggle-group { display: flex; align-items: center; gap: 6px; }
.btn-toggle {
  padding: 3px 10px; border: 1px solid var(--border2); background: var(--bg);
  font-size: 12px; cursor: pointer; color: var(--fg2);
  font-family: inherit; transition: all .1s;
}
.btn-toggle.active { background: var(--active-bg); color: var(--active-fg); border-color: var(--active-bg); }
.loop-count {
  font-size: 14px; color: var(--fg); font-weight: 700;
  font-variant-numeric: tabular-nums;
  background: var(--card); padding: 2px 8px;
}

/* Content toggles */
.content-toggles { display: flex; gap: 4px; margin-bottom: 20px; }
.btn-ct {
  padding: 5px 14px; border: 2px solid var(--fg); background: var(--bg);
  font-size: 13px; cursor: pointer; color: var(--fg);
  font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  transition: all .1s;
}
.btn-ct.active { background: var(--fg); color: var(--bg); }

/* Sections */
.section {
  margin-bottom: 28px; padding-bottom: 24px;
  border-bottom: 2px solid var(--fg);
}
.section-label {
  font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
  font-weight: 700; background: var(--card); display: inline-block;
  padding: 2px 8px; margin-bottom: 14px;
}
.scene-note {
  font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  font-size: 15px; color: var(--fg2); margin-bottom: 14px;
}
.dialogue-line {
  margin-bottom: 16px; padding-left: 12px;
  border-left: 3px solid var(--fg);
  cursor: pointer; transition: border-color .2s, background .2s;
}
.speaker {
  font-size: 12px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--fg2); margin-bottom: 2px;
}
.jp-text {
  font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  font-size: 22px; line-height: 2; font-weight: 500;
}
.jp-text ruby rt { font-size: 11px; color: var(--ruby); transition: opacity .2s; }
.cn-text {
  font-family: -apple-system, "PingFang SC", sans-serif;
  font-size: 15px; color: var(--cn); margin-top: 2px; transition: opacity .2s;
}
body.hide-ruby ruby rt { opacity: 0; }
body.hide-cn .cn-text { display: none; }

.dialogue-line.active { border-left-color: #f59e0b; background: rgba(245,158,11,0.08); }
[data-theme="dark"] .dialogue-line.active { background: rgba(245,158,11,0.1); }

/* Grammar */
.grammar-card {
  padding: 10px 12px; margin-bottom: 4px;
  background: var(--card); border-left: 3px solid var(--fg);
}
.grammar-jp {
  font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  font-size: 18px; font-weight: 600;
}
.grammar-cn {
  font-family: -apple-system, "PingFang SC", sans-serif;
  font-size: 14px; color: var(--fg2); margin-top: 2px;
}
.footer {
  text-align: center; padding: 28px 0;
  font-size: 9px; color: var(--fg3); letter-spacing: 4px; text-transform: uppercase;
}
</style>
</head>

(function(){
  var LESSONS = [{"id":"L01-1","tag":"第1課","title":"私はワン・シューミンです。","meta":"文化初級日本語 I // p.24 // track 1-1-23","audioFile":"1-1-23.mp3","dialogueHTML":"<div class=\"scene-note\">（教室で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">WAN</div><div class=\"jp-text\">はじめまして。<ruby>私<rt>わたし</rt></ruby>はワン・シューミンです。シンガポールから<ruby>来<rt>き</rt></ruby>ました。</div><div class=\"cn-text\">初次见面。我是王·舒明。我从新加坡来。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">はじめまして。ラフルです。インドから<ruby>来<rt>き</rt></ruby>ました。</div><div class=\"cn-text\">初次见面。我是拉弗尔。我从印度来。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">WAN</div><div class=\"jp-text\">どうぞよろしくお<ruby>願<rt>ねが</rt></ruby>いします。</div><div class=\"cn-text\">请多多关照。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">よろしくお<ruby>願<rt>ねが</rt></ruby>いします。</div><div class=\"cn-text\">请多关照。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\"><ruby>私<rt>わたし</rt></ruby>は～です。</div><div class=\"grammar-cn\">我是～。</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～から<ruby>来<rt>き</rt></ruby>ました。</div><div class=\"grammar-cn\">从～来的。</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">はじめまして。</div><div class=\"grammar-cn\">初次见面。</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">どうぞよろしくお<ruby>願<rt>ねが</rt></ruby>いします。</div><div class=\"grammar-cn\">请多多关照。</div></div>","ts":"4.7,10.9,15.6,17.5"},{"id":"L01-2","tag":"第1課","title":"ワンさんは大学生ですか。","meta":"文化初級日本語 I // p.25 // track 1-1-26","audioFile":"1-1-26.mp3","dialogueHTML":"<div class=\"scene-note\">（<ruby>学<rt>がく</rt></ruby><ruby>生<rt>せい</rt></ruby><ruby>会<rt>かい</rt></ruby><ruby>館<rt>かん</rt></ruby>で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">HARA</div><div class=\"jp-text\">はじめまして。<ruby>原<rt>はら</rt></ruby>です。</div><div class=\"cn-text\">初次见面。我姓原。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">WAN</div><div class=\"jp-text\"><ruby>私<rt>わたし</rt></ruby>はワンです。よろしくお<ruby>願<rt>ねが</rt></ruby>いします。</div><div class=\"cn-text\">我是王。请多关照。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">HARA</div><div class=\"jp-text\">ワンさんは<ruby>大<rt>だい</rt></ruby><ruby>学<rt>がく</rt></ruby><ruby>生<rt>せい</rt></ruby>ですか。</div><div class=\"cn-text\">王同学是大学生吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">WAN</div><div class=\"jp-text\">いいえ、<ruby>日<rt>に</rt></ruby><ruby>本<rt>ほん</rt></ruby><ruby>語<rt>ご</rt></ruby><ruby>学<rt>がっ</rt></ruby><ruby>校<rt>こう</rt></ruby>の<ruby>学<rt>がく</rt></ruby><ruby>生<rt>せい</rt></ruby>です。</div><div class=\"cn-text\">不是，我是日语学校的学生。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">HARA</div><div class=\"jp-text\"><ruby>私<rt>わたし</rt></ruby>は<ruby>文<rt>ぶん</rt></ruby><ruby>化<rt>か</rt></ruby><ruby>音<rt>おん</rt></ruby><ruby>楽<rt>がく</rt></ruby><ruby>大<rt>だい</rt></ruby><ruby>学<rt>がく</rt></ruby>の<ruby>学<rt>がく</rt></ruby><ruby>生<rt>せい</rt></ruby>です。よろしく。</div><div class=\"cn-text\">我是文化音乐大学的学生。请多关照。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～さんは～ですか。</div><div class=\"grammar-cn\">～是～吗？（询问对方身份）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">いいえ、～です。</div><div class=\"grammar-cn\">不是，是～。（否定回答）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～の<ruby>学<rt>がく</rt></ruby><ruby>生<rt>せい</rt></ruby>です。</div><div class=\"grammar-cn\">是～的学生。（所属关系）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">よろしく（お<ruby>願<rt>ねが</rt></ruby>いします）。</div><div class=\"grammar-cn\">请多关照。（非正式/正式）</div></div>","ts":"4.0,6.9,11.0,14.3,18.2"},{"id":"L01-3","tag":"第1課","title":"休みはいつですか。","meta":"文化初級日本語 I // p.26 // track 1-1-28","audioFile":"1-1-28.mp3","dialogueHTML":"<div class=\"scene-note\">（<ruby>教<rt>きょう</rt></ruby><ruby>室<rt>しつ</rt></ruby>で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\"><ruby>授<rt>じゅ</rt></ruby><ruby>業<rt>ぎょう</rt></ruby>は9<ruby>時<rt>じ</rt></ruby>10<ruby>分<rt>ぷん</rt></ruby>からです。</div><div class=\"cn-text\">上课从9点10分开始。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">WAN</div><div class=\"jp-text\"><ruby>何<rt>なん</rt></ruby><ruby>時<rt>じ</rt></ruby>までですか。</div><div class=\"cn-text\">到几点结束？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">2<ruby>時<rt>じ</rt></ruby>50<ruby>分<rt>ぷん</rt></ruby>までです。</div><div class=\"cn-text\">到2点50分。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">LEE</div><div class=\"jp-text\"><ruby>昼<rt>ひる</rt></ruby><ruby>休<rt>やす</rt></ruby>みは<ruby>何<rt>なん</rt></ruby><ruby>時<rt>じ</rt></ruby>から<ruby>何<rt>なん</rt></ruby><ruby>時<rt>じ</rt></ruby>までですか。</div><div class=\"cn-text\">午休是从几点到几点？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">12<ruby>時<rt>じ</rt></ruby>から1<ruby>時<rt>じ</rt></ruby>までです。</div><div class=\"cn-text\">从12点到1点。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">あのう、<ruby>休<rt>やす</rt></ruby>みはいつですか。</div><div class=\"cn-text\">请问，休息日是什么时候？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\"><ruby>土<rt>ど</rt></ruby><ruby>曜<rt>よう</rt></ruby><ruby>日<rt>び</rt></ruby>と<ruby>日<rt>にち</rt></ruby><ruby>曜<rt>よう</rt></ruby><ruby>日<rt>び</rt></ruby>です。</div><div class=\"cn-text\">星期六和星期天。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～は～からです。</div><div class=\"grammar-cn\">～从～开始。（表示起点）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～までですか。</div><div class=\"grammar-cn\">到～吗？（表示终点）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～から～まで</div><div class=\"grammar-cn\">从～到～（时间范围）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～はいつですか。</div><div class=\"grammar-cn\">～是什么时候？（询问时间）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～と～</div><div class=\"grammar-cn\">～和～（并列连接）</div></div>","ts":"3.1,6.3,8.3,10.6,14.2,17.2,20.5"},{"id":"L02-1","tag":"第2課","title":"吉田良子さんの一日","meta":"文化初級日本語 I // p.32 // track 1-1-32","audioFile":"1-1-32.mp3","dialogueHTML":"<div class=\"scene-note\">（吉田良子さんの一日）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">AM 7:00</div><div class=\"jp-text\">7<ruby>時<rt>じ</rt></ruby><ruby>半<rt>はん</rt></ruby>に<ruby>起<rt>お</rt></ruby>きます。</div><div class=\"cn-text\">七点半起床。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">AM 7:00</div><div class=\"jp-text\">コーヒーを<ruby>飲<rt>の</rt></ruby>みます。</div><div class=\"cn-text\">喝咖啡。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">AM 8:00</div><div class=\"jp-text\"><ruby>学校<rt>がっこう</rt></ruby>へ<ruby>行<rt>い</rt></ruby>きます。</div><div class=\"cn-text\">去学校。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">AM 9:00</div><div class=\"jp-text\">9<ruby>時<rt>じ</rt></ruby>から3<ruby>時<rt>じ</rt></ruby>まで<ruby>学校<rt>がっこう</rt></ruby>で<ruby>勉強<rt>べんきょう</rt></ruby>をします。</div><div class=\"cn-text\">从9点到3点在学校学习。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">PM 3:00</div><div class=\"jp-text\">3<ruby>時<rt>じ</rt></ruby><ruby>半<rt>はん</rt></ruby>からテニスをします。</div><div class=\"cn-text\">从三点半开始打网球。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">PM 6:00</div><div class=\"jp-text\">6<ruby>時<rt>じ</rt></ruby>にうちへ<ruby>帰<rt>かえ</rt></ruby>ります。</div><div class=\"cn-text\">6点回家。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">PM 6:00</div><div class=\"jp-text\"><ruby>晩<rt>ばん</rt></ruby>ごはんを<ruby>食<rt>た</rt></ruby>べます。</div><div class=\"cn-text\">吃晚饭。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">PM 7:00</div><div class=\"jp-text\">テレビを<ruby>見<rt>み</rt></ruby>ます。</div><div class=\"cn-text\">看电视。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">PM 11:00</div><div class=\"jp-text\">11<ruby>時<rt>じ</rt></ruby><ruby>半<rt>はん</rt></ruby>に<ruby>寝<rt>ね</rt></ruby>ます。</div><div class=\"cn-text\">十一点半睡觉。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～<ruby>時<rt>じ</rt></ruby>に～ます</div><div class=\"grammar-cn\">在～点做～（表示动作发生的时间）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～へ<ruby>行<rt>い</rt></ruby>きます / <ruby>帰<rt>かえ</rt></ruby>ります</div><div class=\"grammar-cn\">去～ / 回～（方向助词 へ）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～から～まで</div><div class=\"grammar-cn\">从～到～（表示时间范围）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～で～をします</div><div class=\"grammar-cn\">在～做～（场所助词 で）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>飲<rt>の</rt></ruby>みます / <ruby>食<rt>た</rt></ruby>べます / <ruby>見<rt>み</rt></ruby>ます</div><div class=\"grammar-cn\">喝～ / 吃～ / 看～（宾语助词 を）</div></div>","ts":"0,3.4,6.2,9.2,14.6,18.7,22.3,25.5,28.0"},{"id":"L02-2","tag":"第2課","title":"昨日、何をしましたか。","meta":"文化初級日本語 I // p.39 // track 1-1-34","audioFile":"1-1-34.mp3","dialogueHTML":"<div class=\"scene-note\">（月曜日　教室で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">おはようございます。</div><div class=\"cn-text\">早上好。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">WAN</div><div class=\"jp-text\">おはようございます。</div><div class=\"cn-text\">早上好。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">ワンさん、<ruby>昨日<rt>きのう</rt></ruby>、<ruby>何<rt>なに</rt></ruby>をしましたか。</div><div class=\"cn-text\">王同学，昨天做了什么？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">WAN</div><div class=\"jp-text\"><ruby>渋谷<rt>しぶや</rt></ruby>で<ruby>映画<rt>えいが</rt></ruby>を<ruby>見<rt>み</rt></ruby>ました。ラフルさんは？</div><div class=\"cn-text\">在涩谷看了电影。拉弗尔同学呢？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\"><ruby>私<rt>わたし</rt></ruby>はテニスをしました。</div><div class=\"cn-text\">我打了网球。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">WAN</div><div class=\"jp-text\">そうですか。</div><div class=\"cn-text\">是吗。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～を～ました</div><div class=\"grammar-cn\">做了～（动词过去时）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～で～を<ruby>見<rt>み</rt></ruby>ました</div><div class=\"grammar-cn\">在～看了～（场所助词 で + 过去时）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～さんは？</div><div class=\"grammar-cn\">～呢？（用は提示话题，省略谓语）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\"><ruby>何<rt>なに</rt></ruby>をしましたか</div><div class=\"grammar-cn\">做了什么？（疑问词 何 + 过去时）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">そうですか</div><div class=\"grammar-cn\">是吗。（表示理解/回应）</div></div>","ts":"7.5,9.2,10.7,13.7,17.1,19.4"},{"id":"L03-1","tag":"第3課","title":"これは誰のノートですか。","meta":"文化初級日本語 I // p.42 // track 1-1-39","audioFile":"1-1-39.mp3","dialogueHTML":"<div class=\"scene-note\">（教室で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">これは<ruby>誰<rt>だれ</rt></ruby>のノートですか。</div><div class=\"cn-text\">这是谁的笔记本？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">それは<ruby>私<rt>わたし</rt></ruby>のノートです。</div><div class=\"cn-text\">那是我的笔记本。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">これもラフルさんのですか。</div><div class=\"cn-text\">这也是拉弗尔同学的吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">いいえ、それは<ruby>私<rt>わたし</rt></ruby>のじゃありません。</div><div class=\"cn-text\">不，那不是我的。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">これ / それ</div><div class=\"grammar-cn\">这个 / 那个（指示代词）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～は<ruby>誰<rt>だれ</rt></ruby>のですか</div><div class=\"grammar-cn\">～是谁的？（所有者疑问）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～も～ですか</div><div class=\"grammar-cn\">～也是～吗？（助词 も 表示\"也\"）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～のじゃありません</div><div class=\"grammar-cn\">不是～的（所有格否定）</div></div>","ts":"2.6,7.7,10.5,13.1"},{"id":"L04-1","tag":"第4課","title":"チンさんの部屋は広いですか。","meta":"文化初級日本語 I // p.49 // track 1-1-45","audioFile":"1-1-45.MP3","dialogueHTML":"<div class=\"scene-note\">（教室で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\">チンさんの<ruby>部屋<rt>へや</rt></ruby>は<ruby>広<rt>ひろ</rt></ruby>いですか。</div><div class=\"cn-text\">陈同学的房间大吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">CHIN</div><div class=\"jp-text\">いいえ、<ruby>広<rt>ひろ</rt></ruby>くありません。マリーさんの<ruby>部屋<rt>へや</rt></ruby>は<ruby>広<rt>ひろ</rt></ruby>いですか。</div><div class=\"cn-text\">不，不大。玛丽同学的房间大吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\">いいえ、<ruby>私<rt>わたし</rt></ruby>の<ruby>部屋<rt>へや</rt></ruby>も<ruby>広<rt>ひろ</rt></ruby>くありません。</div><div class=\"cn-text\">不，我的房间也不大。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">CHIN</div><div class=\"jp-text\">マリーさんの<ruby>部屋<rt>へや</rt></ruby>はきれいですか。</div><div class=\"cn-text\">玛丽同学的房间干净吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\">はい、<ruby>私<rt>わたし</rt></ruby>の<ruby>部屋<rt>へや</rt></ruby>はきれいです。</div><div class=\"cn-text\">是的，我的房间很干净。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">CHIN</div><div class=\"jp-text\">そうですか。<ruby>私<rt>わたし</rt></ruby>の<ruby>部屋<rt>へや</rt></ruby>はきれいじゃありません。</div><div class=\"cn-text\">是吗。我的房间不干净。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～は<ruby>広<rt>ひろ</rt></ruby>いですか</div><div class=\"grammar-cn\">～大吗？（い形容词疑问）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～くありません</div><div class=\"grammar-cn\">不～（い形容词否定）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～も～くありません</div><div class=\"grammar-cn\">～也不～（も + い形容词否定）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～はきれいですか</div><div class=\"grammar-cn\">～干净吗？（な形容词疑问）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～じゃありません</div><div class=\"grammar-cn\">不是～（な形容词否定）</div></div>","ts":"5.3,9.9,15.2,19.3,21.8,24.9"},{"id":"L04-2","tag":"第4課","title":"あの大きいかばんは誰のですか。","meta":"文化初級日本語 I // p.55 // track 1-1-48","audioFile":"1-1-48.MP3","dialogueHTML":"<div class=\"scene-note\">（校外学習で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">このかばんは<ruby>誰<rt>だれ</rt></ruby>のですか。</div><div class=\"cn-text\">这个包是谁的？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">CHIN</div><div class=\"jp-text\">それはマリーさんのです。</div><div class=\"cn-text\">那是玛丽同学的。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">チンさんのかばんはどれですか。</div><div class=\"cn-text\">陈同学的包是哪个？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">CHIN</div><div class=\"jp-text\">その<ruby>黒<rt>くろ</rt></ruby>いのです。</div><div class=\"cn-text\">是那个黑色的。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">あの<ruby>大<rt>おお</rt></ruby>きいかばんは<ruby>誰<rt>だれ</rt></ruby>のですか。</div><div class=\"cn-text\">那个大包是谁的？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">WAN</div><div class=\"jp-text\">あれはラフルさんのです。</div><div class=\"cn-text\">那是拉弗尔同学的。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">この / その / あの + <ruby>名詞<rt>めいし</rt></ruby></div><div class=\"grammar-cn\">这个～ / 那个～ / 那个～（指示连体词）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～は<ruby>誰<rt>だれ</rt></ruby>のですか</div><div class=\"grammar-cn\">～是谁的？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～はどれですか</div><div class=\"grammar-cn\">～是哪个？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">その<ruby>黒<rt>くろ</rt></ruby>いのです</div><div class=\"grammar-cn\">是那个黑色的（の 代替名词）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">あれは～のです</div><div class=\"grammar-cn\">那个是～的</div></div>","ts":"7.4,12.0,14.8,18.0,20.8,26.2"},{"id":"L05-1","tag":"第5課","title":"冷蔵庫の中にジュースがあります。","meta":"文化初級日本語 I // p.59 // track 1-1-51","audioFile":"1-1-51.MP3","dialogueHTML":"<div class=\"scene-note\">（お母さんのメモ）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">MEMO</div><div class=\"jp-text\">けんじくん</div><div class=\"cn-text\">健二</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">MEMO</div><div class=\"jp-text\">おかえりなさい。</div><div class=\"cn-text\">你回来啦。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">MEMO</div><div class=\"jp-text\"><ruby>冷蔵庫<rt>れいぞうこ</rt></ruby>の<ruby>中<rt>なか</rt></ruby>にジュースがあります。</div><div class=\"cn-text\">冰箱里有果汁。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">MEMO</div><div class=\"jp-text\">テーブルの<ruby>上<rt>うえ</rt></ruby>にお<ruby>菓子<rt>かし</rt></ruby>があります。</div><div class=\"cn-text\">桌子上有点心。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">MEMO</div><div class=\"jp-text\">5<ruby>時<rt>じ</rt></ruby>ごろ<ruby>帰<rt>かえ</rt></ruby>ります。</div><div class=\"cn-text\">5点左右回来。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">MEMO</div><div class=\"jp-text\">お<ruby>母<rt>かあ</rt></ruby>さんより</div><div class=\"cn-text\">妈妈</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～の<ruby>中<rt>なか</rt></ruby>に～があります</div><div class=\"grammar-cn\">～里面有～（表示存在）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～の<ruby>上<rt>うえ</rt></ruby>に～があります</div><div class=\"grammar-cn\">～上面有～（表示存在）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～ごろ</div><div class=\"grammar-cn\">大约～（表示大概的时间）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～があります</div><div class=\"grammar-cn\">有～（无生命物体的存在）</div></div>","ts":"0.6,2.8,6.4,10.7,15.0,17.9"},{"id":"L05-2","tag":"第5課","title":"お手洗いはどこにありますか。","meta":"文化初級日本語 I // p.64-65 // track 1-1-55","audioFile":"1-1-55.MP3","dialogueHTML":"<div class=\"scene-note\">（デパートの<ruby>中<rt>なか</rt></ruby>で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">SATO</div><div class=\"jp-text\">あのう、この<ruby>階<rt>かい</rt></ruby>にお<ruby>手洗<rt>てあら</rt></ruby>いはありますか。</div><div class=\"cn-text\">请问，这层楼有洗手间吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">CLERK A</div><div class=\"jp-text\">いいえ。お<ruby>手洗<rt>てあら</rt></ruby>いは3<ruby>階<rt>がい</rt></ruby>にあります。</div><div class=\"cn-text\">没有。洗手间在3楼。</div></div>\n    <div class=\"scene-note\">（3<ruby>階<rt>がい</rt></ruby>で）</div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">SATO</div><div class=\"jp-text\">すみません、お<ruby>手洗<rt>てあら</rt></ruby>いはどこにありますか。</div><div class=\"cn-text\">请问，洗手间在哪里？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">CLERK B</div><div class=\"jp-text\">あそこです。</div><div class=\"cn-text\">在那边。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">SATO</div><div class=\"jp-text\">ああ、あそこですね。どうもありがとうございます。</div><div class=\"cn-text\">啊，在那边啊。非常感谢。</div></div>\n    <div class=\"scene-note\">（お<ruby>手洗<rt>てあら</rt></ruby>いの<ruby>中<rt>なか</rt></ruby>の<ruby>洗面所<rt>せんめんじょ</rt></ruby>で）</div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">MAN</div><div class=\"jp-text\">あれっ、<ruby>私<rt>わたし</rt></ruby>のめがねはどこに…。</div><div class=\"cn-text\">咦，我的眼镜在哪里…。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">SATO</div><div class=\"jp-text\">はい、ここにありますよ。</div><div class=\"cn-text\">给，在这里。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">MAN</div><div class=\"jp-text\">ああ、どうもすみません。</div><div class=\"cn-text\">啊，真不好意思。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～はどこにありますか</div><div class=\"grammar-cn\">～在哪里？（询问物体的位置）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～にあります</div><div class=\"grammar-cn\">在～（表示存在的地点）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">この / あそこ / ここ / どこ</div><div class=\"grammar-cn\">指示代词（地点）：这个/那里/这里/哪里</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～ですね</div><div class=\"grammar-cn\">～对吧（确认语气）</div></div>","ts":"9.8,13.7,24.2,28.0,29.5,42.5,46.7,49.2"},{"id":"L06-1","tag":"第6課","title":"料理をしますか。","meta":"文化初級日本語 I // p.70-71 // track 1-1-58","audioFile":"1-1-58.MP3","dialogueHTML":"<div class=\"scene-note\">（<ruby>鈴木<rt>すずき</rt></ruby>さんのうちで）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">SACHIKO</div><div class=\"jp-text\">みなさん、サンドイッチ、どうぞ。</div><div class=\"cn-text\">大家，三明治，请吃。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">ありがとうございます。</div><div class=\"cn-text\">谢谢。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">ALL</div><div class=\"jp-text\">いただきます。おいしい！</div><div class=\"cn-text\">我开动了。好好吃！</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">SACHIKO</div><div class=\"jp-text\"><ruby>武<rt>たけし</rt></ruby>さん、こちら、<ruby>私<rt>わたし</rt></ruby>の<ruby>友達<rt>ともだち</rt></ruby>の<ruby>吉田<rt>よしだ</rt></ruby><ruby>良子<rt>りょうこ</rt></ruby>さんです。</div><div class=\"cn-text\">武先生，这位是我的朋友吉田良子。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">はじめまして。<ruby>吉田<rt>よしだ</rt></ruby>です。</div><div class=\"cn-text\">初次见面。我是吉田。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">SATO</div><div class=\"jp-text\"><ruby>佐藤<rt>さとう</rt></ruby><ruby>武<rt>たけし</rt></ruby>です。よろしく。</div><div class=\"cn-text\">我是佐藤武。请多关照。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">SATO</div><div class=\"jp-text\"><ruby>幸子<rt>さちこ</rt></ruby>さんの<ruby>料理<rt>りょうり</rt></ruby>はおいしいですね。<ruby>吉田<rt>よしだ</rt></ruby>さんは<ruby>料理<rt>りょうり</rt></ruby>をしますか。</div><div class=\"cn-text\">幸子做的菜真好吃啊。吉田小姐做菜吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">いいえ、あまりしません。</div><div class=\"cn-text\">不，不怎么做。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">SATO</div><div class=\"jp-text\">そうですか。</div><div class=\"cn-text\">是吗。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"9\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\"><ruby>佐藤<rt>さとう</rt></ruby>さんはよくお<ruby>酒<rt>さけ</rt></ruby>を<ruby>飲<rt>の</rt></ruby>みますか。</div><div class=\"cn-text\">佐藤先生经常喝酒吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"10\"><div class=\"speaker\">SATO</div><div class=\"jp-text\">いいえ、ぜんぜん<ruby>飲<rt>の</rt></ruby>みません。<ruby>吉田<rt>よしだ</rt></ruby>さんはよく<ruby>飲<rt>の</rt></ruby>みますか。</div><div class=\"cn-text\">不，完全不喝。吉田小姐经常喝吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"11\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">ときどき<ruby>飲<rt>の</rt></ruby>みます。</div><div class=\"cn-text\">偶尔喝。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"12\"><div class=\"speaker\">SATO</div><div class=\"jp-text\"><ruby>何<rt>なに</rt></ruby>を<ruby>飲<rt>の</rt></ruby>みますか。</div><div class=\"cn-text\">喝什么？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"13\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">ビールかワインを<ruby>飲<rt>の</rt></ruby>みます。</div><div class=\"cn-text\">喝啤酒或红酒。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">こちら、～さんです</div><div class=\"grammar-cn\">这位是～（介绍他人）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～をしますか</div><div class=\"grammar-cn\">做～吗？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">あまり～ません</div><div class=\"grammar-cn\">不怎么～（部分否定）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">ぜんぜん～ません</div><div class=\"grammar-cn\">完全不～（全面否定）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">よく～ますか</div><div class=\"grammar-cn\">经常～吗？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">ときどき～ます</div><div class=\"grammar-cn\">偶尔～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～か～を～ます</div><div class=\"grammar-cn\">～或～（选择）</div></div>","ts":"3.8,8.2,10.8,13.9,21.8,24.3,29.6,37.0,40.1,41.9,46.1,52.6,54.7,57.0"},{"id":"L06-2","tag":"第6課","title":"どんな映画が好きですか。","meta":"文化初級日本語 I // p.74 // track 1-1-61","audioFile":"1-1-61.MP3","dialogueHTML":"<div class=\"scene-note\">（<ruby>鈴木<rt>すずき</rt></ruby>さんのうちで）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\"><ruby>佐藤<rt>さとう</rt></ruby>さんは<ruby>日曜日<rt>にちようび</rt></ruby>に<ruby>何<rt>なに</rt></ruby>をしますか。</div><div class=\"cn-text\">佐藤先生星期天做什么？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">SATO</div><div class=\"jp-text\"><ruby>映画<rt>えいが</rt></ruby>を<ruby>見<rt>み</rt></ruby>ます。</div><div class=\"cn-text\">看电影。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">そうですか。<ruby>映画館<rt>えいがかん</rt></ruby>で<ruby>見<rt>み</rt></ruby>ますか。</div><div class=\"cn-text\">是吗。在电影院看吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">SATO</div><div class=\"jp-text\">いいえ、<ruby>映画館<rt>えいがかん</rt></ruby>では<ruby>見<rt>み</rt></ruby>ません。うちで<ruby>見<rt>み</rt></ruby>ます。</div><div class=\"cn-text\">不，不在电影院看。在家看。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">どんな<ruby>映画<rt>えいが</rt></ruby>が<ruby>好<rt>す</rt></ruby>きですか。</div><div class=\"cn-text\">喜欢什么样的电影？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">SATO</div><div class=\"jp-text\"><ruby>私<rt>わたし</rt></ruby>はコメディーが<ruby>好<rt>す</rt></ruby>きです。<ruby>吉田<rt>よしだ</rt></ruby>さんはどんな<ruby>映画<rt>えいが</rt></ruby>が<ruby>好<rt>す</rt></ruby>きですか。</div><div class=\"cn-text\">我喜欢喜剧。吉田小姐喜欢什么样的电影？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\"><ruby>私<rt>わたし</rt></ruby>はホラーが<ruby>好<rt>す</rt></ruby>きです。</div><div class=\"cn-text\">我喜欢恐怖片。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">SATO</div><div class=\"jp-text\">そうですか。<ruby>私<rt>わたし</rt></ruby>はホラーは<ruby>好<rt>す</rt></ruby>きじゃありません。</div><div class=\"cn-text\">是吗。我不喜欢恐怖片。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～は～が<ruby>好<rt>す</rt></ruby>きです</div><div class=\"grammar-cn\">～喜欢～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～は<ruby>好<rt>す</rt></ruby>きじゃありません</div><div class=\"grammar-cn\">不喜欢～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">どんな～</div><div class=\"grammar-cn\">什么样的～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～で～ます / ～では～ません</div><div class=\"grammar-cn\">在～做/不在～做（场所助词で）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～に<ruby>何<rt>なに</rt></ruby>をしますか</div><div class=\"grammar-cn\">在～做什么？（时间助词に）</div></div>","ts":"0.4,4.9,6.9,10.8,15.8,18.8,26.7,29.5"},{"id":"L06-3","tag":"第6課","title":"サッカーを見るのが好きです。","meta":"文化初級日本語 I // p.80 // track 1-1-63","audioFile":"1-1-63.MP3","dialogueHTML":"<div class=\"scene-note\">（<ruby>鈴木<rt>すずき</rt></ruby>さんのうちで）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\"><ruby>佐藤<rt>さとう</rt></ruby>さんはよくスポーツをしますか。</div><div class=\"cn-text\">佐藤先生经常做运动吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">SATO</div><div class=\"jp-text\">いいえ、あまりしません。<ruby>吉田<rt>よしだ</rt></ruby>さんは？</div><div class=\"cn-text\">不，不怎么做。吉田小姐呢？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\"><ruby>私<rt>わたし</rt></ruby>はよくテニスをします。サッカーも<ruby>好<rt>す</rt></ruby>きです。</div><div class=\"cn-text\">我经常打网球。也喜欢足球。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">SATO</div><div class=\"jp-text\">サッカーをしますか。</div><div class=\"cn-text\">踢足球吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">いいえ、しません。<ruby>私<rt>わたし</rt></ruby>はサッカーを<ruby>見<rt>み</rt></ruby>るのが<ruby>好<rt>す</rt></ruby>きです。<ruby>佐藤<rt>さとう</rt></ruby>さんもよくサッカーを<ruby>見<rt>み</rt></ruby>ますか。</div><div class=\"cn-text\">不，不踢。我喜欢看足球。佐藤先生也经常看足球吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">SATO</div><div class=\"jp-text\">いいえ、あまり<ruby>見<rt>み</rt></ruby>ません。<ruby>私<rt>わたし</rt></ruby>はすもうを<ruby>見<rt>み</rt></ruby>るのが<ruby>好<rt>す</rt></ruby>きです。<ruby>吉田<rt>よしだ</rt></ruby>さんはすもうを<ruby>見<rt>み</rt></ruby>ますか。</div><div class=\"cn-text\">不，不怎么看。我喜欢看相扑。吉田小姐看相扑吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">いいえ、ぜんぜん<ruby>見<rt>み</rt></ruby>ません。</div><div class=\"cn-text\">不，完全不看。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>見<rt>み</rt></ruby>るのが<ruby>好<rt>す</rt></ruby>きです</div><div class=\"grammar-cn\">喜欢看～（动词原形+のが好き）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～も<ruby>好<rt>す</rt></ruby>きです</div><div class=\"grammar-cn\">也喜欢～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～さんは？</div><div class=\"grammar-cn\">～呢？（省略句尾的疑问）</div></div>","ts":"0.5,4.6,9.4,14.5,17.2,23.6,31.0"},{"id":"L07-1","tag":"第7課","title":"財布を落としました。","meta":"文化初級日本語 I // p.84 // track 1-1-65","audioFile":"1-1-65.mp3","dialogueHTML":"<div class=\"scene-note\">（<ruby>学生会館<rt>がくせいかいかん</rt></ruby>で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">あのう、<ruby>財布<rt>さいふ</rt></ruby>を<ruby>落<rt>お</rt></ruby>としました。<ruby>先生<rt>せんせい</rt></ruby>、<ruby>私<rt>わたし</rt></ruby>の<ruby>財布<rt>さいふ</rt></ruby>を<ruby>見<rt>み</rt></ruby>ましたか。</div><div class=\"cn-text\">那个，我的钱包掉了。老师，您看到我的钱包了吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">いいえ。</div><div class=\"cn-text\">没有。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">そうですか…。</div><div class=\"cn-text\">是吗……</div></div>\n    <div class=\"scene-note\" style=\"margin-top:20px\">（<ruby>交番<rt>こうばん</rt></ruby>で）</div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">すみません。</div><div class=\"cn-text\">不好意思。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">KEISATSUKAN</div><div class=\"jp-text\">はい、<ruby>何<rt>なん</rt></ruby>ですか。</div><div class=\"cn-text\">好的，什么事？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">あのう、<ruby>財布<rt>さいふ</rt></ruby>を<ruby>落<rt>お</rt></ruby>としました。</div><div class=\"cn-text\">那个，我的钱包掉了。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">KEISATSUKAN</div><div class=\"jp-text\"><ruby>財布<rt>さいふ</rt></ruby>ですか。どこで<ruby>落<rt>お</rt></ruby>としましたか。</div><div class=\"cn-text\">钱包吗？在哪里掉的？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">わかりません。</div><div class=\"cn-text\">不知道。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">KEISATSUKAN</div><div class=\"jp-text\"><ruby>今日<rt>きょう</rt></ruby>、どこへ<ruby>行<rt>い</rt></ruby>きましたか。</div><div class=\"cn-text\">今天去了哪里？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"9\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">ええと、<ruby>朝<rt>あさ</rt></ruby>、<ruby>郵便局<rt>ゆうびんきょく</rt></ruby>へ<ruby>行<rt>い</rt></ruby>きました。</div><div class=\"cn-text\">嗯，早上去了邮局。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"10\"><div class=\"speaker\">KEISATSUKAN</div><div class=\"jp-text\">その<ruby>時<rt>とき</rt></ruby>、<ruby>財布<rt>さいふ</rt></ruby>はありましたか。</div><div class=\"cn-text\">那时候钱包还在吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"11\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">はい、ありました。<ruby>切手<rt>きって</rt></ruby>を<ruby>買<rt>か</rt></ruby>いました。それから、うちへ<ruby>帰<rt>かえ</rt></ruby>りました。</div><div class=\"cn-text\">在的。买了邮票。然后就回家了。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"12\"><div class=\"speaker\">KEISATSUKAN</div><div class=\"jp-text\">そうですか。<ruby>部屋<rt>へや</rt></ruby>の<ruby>中<rt>なか</rt></ruby>を<ruby>探<rt>さが</rt></ruby>しましたか。</div><div class=\"cn-text\">是吗。找过房间里面了吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"13\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">ええ。でも、ありませんでした。</div><div class=\"cn-text\">找过了。但是没有。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>落<rt>お</rt></ruby>としました</div><div class=\"grammar-cn\">弄丢了～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>見<rt>み</rt></ruby>ましたか</div><div class=\"grammar-cn\">看到～了吗？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">どこで～ましたか</div><div class=\"grammar-cn\">在哪里～了？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～へ<ruby>行<rt>い</rt></ruby>きました</div><div class=\"grammar-cn\">去了～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～はありましたか</div><div class=\"grammar-cn\">～在吗？/有～吗？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>買<rt>か</rt></ruby>いました</div><div class=\"grammar-cn\">买了～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>探<rt>さが</rt></ruby>しましたか</div><div class=\"grammar-cn\">找过～了吗？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">ありませんでした</div><div class=\"grammar-cn\">没有（过去否定）</div></div>","ts":"3.9,7.3,8.4,20.2,21.6,23.6,26.6,30.2,31.9,34.2,38.1,41.0,47.8,51.8"},{"id":"L07-2","tag":"第7課","title":"黒くて小さい財布です。","meta":"文化初級日本語 I // p.89 // track 1-1-68","audioFile":"1-1-68.mp3","dialogueHTML":"<div class=\"scene-note\">（<ruby>交番<rt>こうばん</rt></ruby>で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">KEISATSUKAN</div><div class=\"jp-text\">どんな<ruby>財布<rt>さいふ</rt></ruby>ですか。</div><div class=\"cn-text\">什么样的钱包？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\"><ruby>黒<rt>くろ</rt></ruby>くて<ruby>小<rt>ちい</rt></ruby>さい<ruby>財布<rt>さいふ</rt></ruby>です。</div><div class=\"cn-text\">黑色的小钱包。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">KEISATSUKAN</div><div class=\"jp-text\"><ruby>財布<rt>さいふ</rt></ruby>の<ruby>中<rt>なか</rt></ruby>にいくらありましたか。</div><div class=\"cn-text\">钱包里有多少钱？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">ええと…、7<ruby>千<rt>せん</rt></ruby><ruby>円<rt>えん</rt></ruby>ぐらいです。</div><div class=\"cn-text\">嗯…，大概7000日元。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">KEISATSUKAN</div><div class=\"jp-text\">そうですか。</div><div class=\"cn-text\">是吗。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">キャッシュカードもありました。</div><div class=\"cn-text\">还有银行卡。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">KEISATSUKAN</div><div class=\"jp-text\">お<ruby>金<rt>かね</rt></ruby>とキャッシュカード…。ほかには？</div><div class=\"cn-text\">钱和银行卡……还有别的吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">ええと…、お<ruby>金<rt>かね</rt></ruby>とキャッシュカードだけです。</div><div class=\"cn-text\">嗯…，只有钱和银行卡。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">KEISATSUKAN</div><div class=\"jp-text\">わかりました。じゃ、ここにあなたの<ruby>住所<rt>じゅうしょ</rt></ruby>と<ruby>名前<rt>なまえ</rt></ruby>と<ruby>電話番号<rt>でんわばんごう</rt></ruby>を<ruby>書<rt>か</rt></ruby>いてください。</div><div class=\"cn-text\">知道了。那请在这里写上您的地址、姓名和电话号码。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"9\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">はい。</div><div class=\"cn-text\">好的。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"10\"><div class=\"speaker\">KEISATSUKAN</div><div class=\"jp-text\">あっ、ボールペンで<ruby>書<rt>か</rt></ruby>いてください。</div><div class=\"cn-text\">啊，请用圆珠笔写。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"11\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">はい…。これでいいですか。</div><div class=\"cn-text\">好的……这样可以吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"12\"><div class=\"speaker\">KEISATSUKAN</div><div class=\"jp-text\">はい、けっこうです。じゃ、<ruby>後<rt>あと</rt></ruby>で<ruby>連絡<rt>れんらく</rt></ruby>します。</div><div class=\"cn-text\">好的，可以了。那之后会联系您。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"13\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">よろしくお<ruby>願<rt>ねが</rt></ruby>いします。</div><div class=\"cn-text\">拜托了。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">どんな～ですか</div><div class=\"grammar-cn\">什么样的～？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～くて～い（い<ruby>形容詞<rt>けいようし</rt></ruby>の<ruby>連用形<rt>れんようけい</rt></ruby>）</div><div class=\"grammar-cn\">又～又～（い形容词连用形）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～の<ruby>中<rt>なか</rt></ruby>にいくらありましたか</div><div class=\"grammar-cn\">～里面有多少？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～ぐらい</div><div class=\"grammar-cn\">大约～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～もありました</div><div class=\"grammar-cn\">也有～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～だけです</div><div class=\"grammar-cn\">只有～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>書<rt>か</rt></ruby>いてください</div><div class=\"grammar-cn\">请写～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～で<ruby>書<rt>か</rt></ruby>いてください</div><div class=\"grammar-cn\">请用～写</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～でいいですか</div><div class=\"grammar-cn\">这样可以吗？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\"><ruby>後<rt>あと</rt></ruby>で<ruby>連絡<rt>れんらく</rt></ruby>します</div><div class=\"grammar-cn\">之后联系</div></div>","ts":"4.5,6.4,8.8,11.7,14.7,16.1,18.2,22.1,26.4,32.5,33.6,35.8,41.0,44.9"},{"id":"L07-3","tag":"第7課","title":"ラフルさんの財布じゃありませんか。","meta":"文化初級日本語 I // p.93 // track 1-1-71","audioFile":"1-1-71.mp3","dialogueHTML":"<div class=\"scene-note\">（<ruby>学生会館<rt>がくせいかいかん</rt></ruby>で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">ただいま。</div><div class=\"cn-text\">我回来了。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">あ、ラフルさん、おかえりなさい。<ruby>財布<rt>さいふ</rt></ruby>、ありましたか。</div><div class=\"cn-text\">啊，拉弗尔，你回来了。钱包找到了吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">いいえ…。</div><div class=\"cn-text\">没有……</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">ラフルさん、お<ruby>金<rt>かね</rt></ruby>はだいじょうぶですか。</div><div class=\"cn-text\">拉弗尔，钱还够用吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">はい、チンさんに<ruby>借<rt>か</rt></ruby>ります。</div><div class=\"cn-text\">够的，我跟小陈借。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">そうですか。<ruby>私<rt>わたし</rt></ruby>も<ruby>貸<rt>か</rt></ruby>しますよ。</div><div class=\"cn-text\">是吗。我也可以借给你。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">ありがとうございます。</div><div class=\"cn-text\">谢谢。</div></div>\n    <div class=\"scene-note\" style=\"margin-top:20px\">（ラフルさんの<ruby>部屋<rt>へや</rt></ruby>の<ruby>前<rt>まえ</rt></ruby>で）</div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">CHIN</div><div class=\"jp-text\">あ、ラフルさん。これ、ラフルさんの<ruby>財布<rt>さいふ</rt></ruby>じゃありませんか。</div><div class=\"cn-text\">啊，拉弗尔。这个，不是拉弗尔的钱包吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">あっ、そうです。どこにありましたか。</div><div class=\"cn-text\">啊，是的。在哪里找到的？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"9\"><div class=\"speaker\">CHIN</div><div class=\"jp-text\">ラフルさんの<ruby>部屋<rt>へや</rt></ruby>の<ruby>前<rt>まえ</rt></ruby>にありました。</div><div class=\"cn-text\">在拉弗尔房间门前。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"10\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">ああ、そうですか。どうもありがとうございました。</div><div class=\"cn-text\">啊，是吗。非常感谢。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～じゃありませんか</div><div class=\"grammar-cn\">不是～吗？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～に<ruby>借<rt>か</rt></ruby>ります</div><div class=\"grammar-cn\">向～借</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～も<ruby>貸<rt>か</rt></ruby>しますよ</div><div class=\"grammar-cn\">也借给（你）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">おかえりなさい</div><div class=\"grammar-cn\">你回来了（欢迎回来）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">だいじょうぶですか</div><div class=\"grammar-cn\">没问题吗？/还好吗？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～の<ruby>前<rt>まえ</rt></ruby>にありました</div><div class=\"grammar-cn\">在～前面</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">どうもありがとうございました</div><div class=\"grammar-cn\">非常感谢（过去式，表示已完成的帮助）</div></div>","ts":"0.2,3.2,8.0,10.2,12.6,14.8,17.5,28.1,33.8,37.7,40.8"},{"id":"L08-1","tag":"第8課","title":"天気はどうでしたか。","meta":"文化初級日本語 I // p.95 // track 1-1-73","audioFile":"1-1-73.mp3","dialogueHTML":"<div class=\"scene-note\">（ニュース<ruby>番組<rt>ばんぐみ</rt></ruby>）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">CASTER</div><div class=\"jp-text\">こんばんは。<ruby>今日<rt>きょう</rt></ruby>は<ruby>5<rt>ご</rt></ruby><ruby>月<rt>がつ</rt></ruby><ruby>5<rt>いつ</rt></ruby><ruby>日<rt>か</rt></ruby>、<ruby>子供<rt>こども</rt></ruby>の<ruby>日<rt>ひ</rt></ruby>です。<ruby>今年<rt>ことし</rt></ruby>のゴールデンウィークは<ruby>今日<rt>きょう</rt></ruby>で<ruby>終<rt>お</rt></ruby>わりました。<ruby>今日<rt>きょう</rt></ruby>、<ruby>約<rt>やく</rt></ruby><ruby>5<rt>ご</rt></ruby><ruby>万人<rt>まんにん</rt></ruby>の<ruby>人<rt>ひと</rt></ruby>が<ruby>帰国<rt>きこく</rt></ruby>しました。<ruby>成田空港<rt>なりたくうこう</rt></ruby>から<ruby>伊藤<rt>いとう</rt></ruby><ruby>記者<rt>きしゃ</rt></ruby>が<ruby>報告<rt>ほうこく</rt></ruby>します。</div><div class=\"cn-text\">晚上好。今天是5月5日，儿童节。今年的黄金周今天就结束了。今天约有5万人回国了。下面由成田机场的伊藤记者进行报道。</div></div>\n    <div class=\"scene-note\" style=\"margin-top:20px\">（<ruby>成田空港<rt>なりたくうこう</rt></ruby>で）</div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">ITO</div><div class=\"jp-text\">あのう、すみません。</div><div class=\"cn-text\">那个，不好意思。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">WOMAN</div><div class=\"jp-text\">はい。</div><div class=\"cn-text\">嗯。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">ITO</div><div class=\"jp-text\">どこへいらっしゃいましたか。</div><div class=\"cn-text\">您去了哪里？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">WOMAN</div><div class=\"jp-text\">ハワイへ<ruby>行<rt>い</rt></ruby>きました。</div><div class=\"cn-text\">去了夏威夷。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">ITO</div><div class=\"jp-text\"><ruby>何<rt>なん</rt></ruby><ruby>日間<rt>にちかん</rt></ruby>ですか。</div><div class=\"cn-text\">去了几天？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">WOMAN</div><div class=\"jp-text\">1<ruby>週間<rt>しゅうかん</rt></ruby>です。</div><div class=\"cn-text\">一周。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">ITO</div><div class=\"jp-text\"><ruby>旅行<rt>りょこう</rt></ruby>はどうでしたか。</div><div class=\"cn-text\">旅行怎么样？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">WOMAN</div><div class=\"jp-text\"><ruby>少<rt>すこ</rt></ruby>し<ruby>疲<rt>つか</rt></ruby>れましたが、<ruby>楽<rt>たの</rt></ruby>しかったです。</div><div class=\"cn-text\">虽然有点累，但是很开心。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"9\"><div class=\"speaker\">ITO</div><div class=\"jp-text\"><ruby>天気<rt>てんき</rt></ruby>はどうでしたか。</div><div class=\"cn-text\">天气怎么样？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"10\"><div class=\"speaker\">WOMAN</div><div class=\"jp-text\"><ruby>毎日<rt>まいにち</rt></ruby>とてもいい<ruby>天気<rt>てんき</rt></ruby>でした。でも、ちょっと<ruby>暑<rt>あつ</rt></ruby>かったですけど。<ruby>朝<rt>あさ</rt></ruby>と<ruby>夜<rt>よる</rt></ruby>はあまり<ruby>暑<rt>あつ</rt></ruby>くありませんでした。</div><div class=\"cn-text\">每天都是非常好的天气。不过有点热。早上和晚上不太热。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"11\"><div class=\"speaker\">ITO</div><div class=\"jp-text\">いつごろ<ruby>切符<rt>きっぷ</rt></ruby>を<ruby>予約<rt>よやく</rt></ruby>しましたか。</div><div class=\"cn-text\">什么时候预约的机票？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"12\"><div class=\"speaker\">WOMAN</div><div class=\"jp-text\">3か<ruby>月前<rt>げつまえ</rt></ruby>です。</div><div class=\"cn-text\">三个月前。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"13\"><div class=\"speaker\">ITO</div><div class=\"jp-text\"><ruby>予約<rt>よやく</rt></ruby>は<ruby>大変<rt>たいへん</rt></ruby>でしたか。</div><div class=\"cn-text\">预约困难吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"14\"><div class=\"speaker\">WOMAN</div><div class=\"jp-text\">いいえ、あまり<ruby>大変<rt>たいへん</rt></ruby>じゃありませんでした。</div><div class=\"cn-text\">不，不太难。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～はどうでしたか</div><div class=\"grammar-cn\">～怎么样？（过去）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～で<ruby>終<rt>お</rt></ruby>わりました</div><div class=\"grammar-cn\">到～就结束了</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～へいらっしゃいましたか</div><div class=\"grammar-cn\">您去了～？（敬语）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\"><ruby>何<rt>なん</rt></ruby><ruby>日間<rt>にちかん</rt></ruby>ですか</div><div class=\"grammar-cn\">几天？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～ましたが、～かったです</div><div class=\"grammar-cn\">虽然～，但是～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～くありませんでした</div><div class=\"grammar-cn\">不～（い形容词过去否定）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">いつごろ～ましたか</div><div class=\"grammar-cn\">什么时候～了？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">あまり～じゃありませんでした</div><div class=\"grammar-cn\">不太～（な形容词过去否定）</div></div>","ts":"0.3,20.7,22.0,22.6,24.5,26.0,27.2,28.5,32.1,35.6,37.2,43.1,44.9,46.5,49.0"},{"id":"L08-2","tag":"第8課","title":"安くておいしかったです。","meta":"文化初級日本語 I // p.103 // track 1-1-76","audioFile":"1-1-76.mp3","dialogueHTML":"<div class=\"scene-note\">（<ruby>成田空港<rt>なりたくうこう</rt></ruby>で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">ITO</div><div class=\"jp-text\"><ruby>食<rt>た</rt></ruby>べ<ruby>物<rt>もの</rt></ruby>はどうでしたか。</div><div class=\"cn-text\">食物怎么样？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">WOMAN</div><div class=\"jp-text\">おいしかったです。</div><div class=\"cn-text\">很好吃。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">ITO</div><div class=\"jp-text\"><ruby>何<rt>なに</rt></ruby>がおいしかったですか。</div><div class=\"cn-text\">什么好吃？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">WOMAN</div><div class=\"jp-text\">パイナップルが<ruby>安<rt>やす</rt></ruby>くておいしかったです。</div><div class=\"cn-text\">菠萝又便宜又好吃。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">MAN</div><div class=\"jp-text\"><ruby>魚<rt>さかな</rt></ruby>も<ruby>新鮮<rt>しんせん</rt></ruby>でおいしかったです。<ruby>肉<rt>にく</rt></ruby>はあまり<ruby>食<rt>た</rt></ruby>べませんでしたが、<ruby>魚<rt>さかな</rt></ruby>はたくさん<ruby>食<rt>た</rt></ruby>べました。</div><div class=\"cn-text\">鱼也很新鲜好吃。肉不怎么吃，但鱼吃了很多。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">ITO</div><div class=\"jp-text\">おみやげを<ruby>買<rt>か</rt></ruby>いましたか。</div><div class=\"cn-text\">买了特产吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">WOMAN</div><div class=\"jp-text\">はい、チョコレートを<ruby>買<rt>か</rt></ruby>いました。</div><div class=\"cn-text\">是的，买了巧克力。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">MAN</div><div class=\"jp-text\">Tシャツも<ruby>買<rt>か</rt></ruby>いました。</div><div class=\"cn-text\">还买了T恤。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">ITO</div><div class=\"jp-text\">どうもありがとうございました。<ruby>成田空港<rt>なりたくうこう</rt></ruby>から<ruby>報告<rt>ほうこく</rt></ruby>しました。</div><div class=\"cn-text\">非常感谢。以上由成田机场报道。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～はどうでしたか</div><div class=\"grammar-cn\">～怎么样？（过去）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～がおいしかったです</div><div class=\"grammar-cn\">～好吃</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～くて～かったです</div><div class=\"grammar-cn\">又～又～（い形容词连用）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～で～かったです</div><div class=\"grammar-cn\">又～又～（な形容词连用）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">あまり～ませんでしたが、～ました</div><div class=\"grammar-cn\">不怎么～，但是～了</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>買<rt>か</rt></ruby>いましたか</div><div class=\"grammar-cn\">买了～吗？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～も<ruby>買<rt>か</rt></ruby>いました</div><div class=\"grammar-cn\">也买了～</div></div>","ts":"1.5,4.0,5.5,8.0,11.0,26.2,28.4,30.7,32.5"},{"id":"L09-1","tag":"第9課","title":"説明をよく聞いてください。","meta":"文化初級日本語 I // p.106 // track 1-1-79","audioFile":"1-1-79.mp3","dialogueHTML":"<div class=\"scene-note\">（<ruby>教室<rt>きょうしつ</rt></ruby>で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">みなさんはよく<ruby>本<rt>ほん</rt></ruby>を<ruby>読<rt>よ</rt></ruby>みますか。</div><div class=\"cn-text\">大家经常看书吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">STUDENTS</div><div class=\"jp-text\">はい。</div><div class=\"cn-text\">是的。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">どんな<ruby>本<rt>ほん</rt></ruby>を<ruby>読<rt>よ</rt></ruby>みますか。</div><div class=\"cn-text\">看什么样的书？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">WAN</div><div class=\"jp-text\"><ruby>私<rt>わたし</rt></ruby>はファッションの<ruby>本<rt>ほん</rt></ruby>をよく<ruby>読<rt>よ</rt></ruby>みます。</div><div class=\"cn-text\">我经常看时尚类的书。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\"><ruby>私<rt>わたし</rt></ruby>はコンピューターの<ruby>本<rt>ほん</rt></ruby>を<ruby>読<rt>よ</rt></ruby>みます。</div><div class=\"cn-text\">我看电脑类的书。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">そうですか。<ruby>今日<rt>きょう</rt></ruby>は、これから<ruby>学校<rt>がっこう</rt></ruby>の<ruby>図書館<rt>としょかん</rt></ruby>へ<ruby>行<rt>い</rt></ruby>きます。<ruby>図書館<rt>としょかん</rt></ruby>の<ruby>人<rt>ひと</rt></ruby>の<ruby>説明<rt>せつめい</rt></ruby>をよく<ruby>聞<rt>き</rt></ruby>いてください。</div><div class=\"cn-text\">是吗。今天我们接下来要去学校的图书馆。请认真听图书馆工作人员的说明。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">STUDENTS</div><div class=\"jp-text\">はい。</div><div class=\"cn-text\">好的。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">みなさん、<ruby>学生証<rt>がくせいしょう</rt></ruby>を<ruby>持<rt>も</rt></ruby>って<ruby>行<rt>い</rt></ruby>ってください。それから、<ruby>図書館<rt>としょかん</rt></ruby>の<ruby>中<rt>なか</rt></ruby>で、<ruby>大<rt>おお</rt></ruby>きい<ruby>声<rt>こえ</rt></ruby>で<ruby>話<rt>はな</rt></ruby>してはいけません。</div><div class=\"cn-text\">大家，请带上学生证。还有，在图书馆里不能大声说话。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">STUDENTS</div><div class=\"jp-text\">はい。</div><div class=\"cn-text\">好的。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"9\"><div class=\"speaker\">WAN</div><div class=\"jp-text\">あのう、<ruby>飲<rt>の</rt></ruby>み<ruby>物<rt>もの</rt></ruby>を<ruby>持<rt>も</rt></ruby>って<ruby>行<rt>い</rt></ruby>ってもいいですか。</div><div class=\"cn-text\">那个，可以带饮料去吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"10\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">ええ、いいですよ。でも、かばんの<ruby>中<rt>なか</rt></ruby>に<ruby>入<rt>い</rt></ruby>れてください。</div><div class=\"cn-text\">可以的。但是请放在书包里。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～をよく<ruby>読<rt>よ</rt></ruby>みますか</div><div class=\"grammar-cn\">经常读～吗？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～をよく<ruby>聞<rt>き</rt></ruby>いてください</div><div class=\"grammar-cn\">请认真听～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>持<rt>も</rt></ruby>って<ruby>行<rt>い</rt></ruby>ってください</div><div class=\"grammar-cn\">请带上～去</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～てはいけません</div><div class=\"grammar-cn\">不能～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～てもいいですか</div><div class=\"grammar-cn\">可以～吗？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～の<ruby>中<rt>なか</rt></ruby>に<ruby>入<rt>い</rt></ruby>れてください</div><div class=\"grammar-cn\">请放进～里</div></div>","ts":"2.9,6.1,7.4,9.6,13.0,16.2,25.2,27.5,36.7,38.1,41.7"},{"id":"L09-2","tag":"第9課","title":"本の探し方を説明します。","meta":"文化初級日本語 I // p.111 // track 1-1-81","audioFile":"1-1-81.mp3","dialogueHTML":"<div class=\"scene-note\">（図書館で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">LIBRARIAN</div><div class=\"jp-text\">これから<ruby>本<rt>ほん</rt></ruby>の<ruby>探<rt>さが</rt></ruby>し<ruby>方<rt>かた</rt></ruby>を<ruby>説明<rt>せつめい</rt></ruby>します。よく<ruby>聞<rt>き</rt></ruby>いてください。</div><div class=\"cn-text\">现在我来说明查找书籍的方法。请认真听。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">STUDENTS</div><div class=\"jp-text\">はい。</div><div class=\"cn-text\">好的。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">LIBRARIAN</div><div class=\"jp-text\">まず、ここに<ruby>本<rt>ほん</rt></ruby>の<ruby>名前<rt>なまえ</rt></ruby>を<ruby>入<rt>い</rt></ruby>れて、ここを<ruby>押<rt>お</rt></ruby>してください。</div><div class=\"cn-text\">首先，在这里输入书名，然后按这里。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">すみません、どこを<ruby>押<rt>お</rt></ruby>しますか。</div><div class=\"cn-text\">不好意思，按哪里？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">LIBRARIAN</div><div class=\"jp-text\">ここです。</div><div class=\"cn-text\">这里。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">ああ、わかりました。ありがとうございます。</div><div class=\"cn-text\">啊，明白了。谢谢。</div></div>\n    <div class=\"scene-note\" style=\"margin-top:20px\">（本棚の前で）</div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">KIM</div><div class=\"jp-text\">ワンさん、<ruby>本<rt>ほん</rt></ruby>を<ruby>取<rt>と</rt></ruby>りましょうか。</div><div class=\"cn-text\">王同学，我帮你拿书吧？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">WAN</div><div class=\"jp-text\">すみません。お<ruby>願<rt>ねが</rt></ruby>いします。</div><div class=\"cn-text\">不好意思，麻烦你了。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">KIM</div><div class=\"jp-text\">はい、どうぞ。</div><div class=\"cn-text\">给你。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"9\"><div class=\"speaker\">WAN</div><div class=\"jp-text\">ありがとうございます。</div><div class=\"cn-text\">谢谢。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～の<ruby>探<rt>さが</rt></ruby>し<ruby>方<rt>かた</rt></ruby>を<ruby>説明<rt>せつめい</rt></ruby>します</div><div class=\"grammar-cn\">说明～的查找方法</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>入<rt>い</rt></ruby>れて、～を<ruby>押<rt>お</rt></ruby>してください</div><div class=\"grammar-cn\">请输入～，然后按～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">どこを<ruby>押<rt>お</rt></ruby>しますか</div><div class=\"grammar-cn\">按哪里？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>取<rt>と</rt></ruby>りましょうか</div><div class=\"grammar-cn\">我帮你拿～吧？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">お<ruby>願<rt>ねが</rt></ruby>いします</div><div class=\"grammar-cn\">麻烦你了</div></div>","ts":"2.6,8.1,9.4,15.0,17.6,19.0,28.2,31.5,34.3,37.7"},{"id":"L09-3","tag":"第9課","title":"24日までに返してください。","meta":"文化初級日本語 I // p.117 // track 1-1-84","audioFile":"1-1-84.mp3","dialogueHTML":"<div class=\"scene-note\">（図書館のカウンターで）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">WAN</div><div class=\"jp-text\">この<ruby>本<rt>ほん</rt></ruby>をお<ruby>願<rt>ねが</rt></ruby>いします。</div><div class=\"cn-text\">我要借这本书。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">LIBRARIAN</div><div class=\"jp-text\">はい。<ruby>24<rt>にじゅうよっ</rt></ruby><ruby>日<rt>か</rt></ruby>までに<ruby>返<rt>かえ</rt></ruby>してください。</div><div class=\"cn-text\">好的。请在24号之前归还。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">WAN</div><div class=\"jp-text\">はい、わかりました。</div><div class=\"cn-text\">好的，我知道了。</div></div>\n    <div class=\"scene-note\" style=\"margin-top:20px\">（図書館の前で）</div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">WAN</div><div class=\"jp-text\">ラフルさんは<ruby>何<rt>なに</rt></ruby>か<ruby>借<rt>か</rt></ruby>りましたか。</div><div class=\"cn-text\">拉弗尔，你借了什么吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">いいえ、<ruby>何<rt>なに</rt></ruby>も<ruby>借<rt>か</rt></ruby>りませんでした。ワンさんは<ruby>何<rt>なに</rt></ruby>か<ruby>借<rt>か</rt></ruby>りましたか。</div><div class=\"cn-text\">没有，什么都没借。王同学你借了什么？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">WAN</div><div class=\"jp-text\">はい、<ruby>日本<rt>にほん</rt></ruby>の<ruby>着物<rt>きもの</rt></ruby>の<ruby>本<rt>ほん</rt></ruby>を<ruby>借<rt>か</rt></ruby>りました。これです。</div><div class=\"cn-text\">是的，我借了一本关于日本和服的书。就是这本。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">ああ、きれいな<ruby>着物<rt>きもの</rt></ruby>ですね。</div><div class=\"cn-text\">哇，好漂亮的和服啊。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">WAN</div><div class=\"jp-text\">そうですね。</div><div class=\"cn-text\">是啊。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～までに<ruby>返<rt>かえ</rt></ruby>してください</div><div class=\"grammar-cn\">请在～之前归还</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～は<ruby>何<rt>なに</rt></ruby>か<ruby>借<rt>か</rt></ruby>りましたか</div><div class=\"grammar-cn\">～借了什么吗？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\"><ruby>何<rt>なに</rt></ruby>も～ませんでした</div><div class=\"grammar-cn\">什么都没～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～の<ruby>本<rt>ほん</rt></ruby>を<ruby>借<rt>か</rt></ruby>りました</div><div class=\"grammar-cn\">借了～的书</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">きれいな～ですね</div><div class=\"grammar-cn\">好漂亮的～啊</div></div>","ts":"0.4,4.2,11.9,15.8,19.2,25.1,33.4,35.3"},{"id":"L10-1","tag":"第10課","title":"東京から熱海まで、新幹線で行きます。","meta":"文化初級日本語 I // p.120 // track 1-2-02","audioFile":"1-2-02.mp3","dialogueHTML":"<div class=\"scene-note\">（東京駅で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">GUIDE</div><div class=\"jp-text\">みなさん、<ruby>今<rt>いま</rt></ruby>から<ruby>今日<rt>きょう</rt></ruby>の<ruby>予定<rt>よてい</rt></ruby>を<ruby>言<rt>い</rt></ruby>います。</div><div class=\"cn-text\">大家好，现在我来说一下今天的行程安排。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">GUIDE</div><div class=\"jp-text\">まず、<ruby>東京<rt>とうきょう</rt></ruby>から<ruby>熱海<rt>あたみ</rt></ruby>まで、<ruby>新幹線<rt>しんかんせん</rt></ruby>こだま６０３<ruby>号<rt>ごう</rt></ruby>で<ruby>行<rt>い</rt></ruby>きます。</div><div class=\"cn-text\">首先，从东京到热海，我们乘坐新干线回声号603次列车。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">GUIDE</div><div class=\"jp-text\">こだま６０３<ruby>号<rt>ごう</rt></ruby>は、<ruby>午後<rt>ごご</rt></ruby>２<ruby>時<rt>じ</rt></ruby>２０<ruby>分<rt>ぷん</rt></ruby>に<ruby>東京駅<rt>とうきょうえき</rt></ruby>を<ruby>出<rt>で</rt></ruby>て、３<ruby>時<rt>じ</rt></ruby>１７<ruby>分<rt>ふん</rt></ruby>に<ruby>熱海<rt>あたみ</rt></ruby>に<ruby>着<rt>つ</rt></ruby>きます。</div><div class=\"cn-text\">回声号603次列车下午2点20分从东京站出发，3点17分到达热海。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">GUIDE</div><div class=\"jp-text\"><ruby>熱海<rt>あたみ</rt></ruby>で<ruby>新幹線<rt>しんかんせん</rt></ruby>を<ruby>降<rt>お</rt></ruby>りて、バスに<ruby>乗<rt>の</rt></ruby>りかえて、<ruby>下田<rt>しもだ</rt></ruby>までバスで<ruby>行<rt>い</rt></ruby>きます。</div><div class=\"cn-text\">在热海下新干线，换乘巴士，坐巴士前往下田。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">GUIDE</div><div class=\"jp-text\"><ruby>途中<rt>とちゅう</rt></ruby>、<ruby>伊東<rt>いとう</rt></ruby>でバスを<ruby>降<rt>お</rt></ruby>りて<ruby>休憩<rt>きゅうけい</rt></ruby>します。</div><div class=\"cn-text\">途中在伊东下车休息。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">GUIDE</div><div class=\"jp-text\"><ruby>熱海<rt>あたみ</rt></ruby>から<ruby>下田<rt>しもだ</rt></ruby>まで２<ruby>時間<rt>じかん</rt></ruby>ぐらいかかります。</div><div class=\"cn-text\">从热海到下田大约需要2个小时。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">GUIDE</div><div class=\"jp-text\">５<ruby>時半<rt>じはん</rt></ruby>ごろ<ruby>下田<rt>しもだ</rt></ruby>に<ruby>着<rt>つ</rt></ruby>きます。</div><div class=\"cn-text\">5点半左右到达下田。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～から～まで、～で<ruby>行<rt>い</rt></ruby>きます</div><div class=\"grammar-cn\">从～到～，乘坐～去</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～<ruby>時<rt>じ</rt></ruby>～<ruby>分<rt>ふん</rt></ruby>に～を<ruby>出<rt>で</rt></ruby>て</div><div class=\"grammar-cn\">～点～分从～出发</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～に<ruby>着<rt>つ</rt></ruby>きます</div><div class=\"grammar-cn\">到达～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>降<rt>お</rt></ruby>りて、～に<ruby>乗<rt>の</rt></ruby>りかえて</div><div class=\"grammar-cn\">下～，换乘～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～<ruby>時間<rt>じかん</rt></ruby>ぐらいかかります</div><div class=\"grammar-cn\">大约需要～小时</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～ごろ～に<ruby>着<rt>つ</rt></ruby>きます</div><div class=\"grammar-cn\">～左右到达～</div></div>","ts":"4.5,9.1,16.8,27.8,35.2,39.9,44.4"},{"id":"L10-2","tag":"第10課","title":"電話をしています。","meta":"文化初級日本語 I // p.124 // track 1-2-05","audioFile":"1-2-05.mp3","dialogueHTML":"<div class=\"scene-note\">（伊東で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">ESCORT</div><div class=\"jp-text\">みなさん、もうすぐ<ruby>出発<rt>しゅっぱつ</rt></ruby>します。バスに<ruby>乗<rt>の</rt></ruby>ってください。</div><div class=\"cn-text\">大家，马上就要出发了。请上车。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">SARA</div><div class=\"jp-text\">あれっ、<ruby>広田<rt>ひろた</rt></ruby>さんや<ruby>林<rt>はやし</rt></ruby>さんは？</div><div class=\"cn-text\">咦，广田和林呢？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">YAMAMOTO</div><div class=\"jp-text\"><ruby>林<rt>はやし</rt></ruby>さんは、<ruby>今<rt>いま</rt></ruby>、<ruby>電話<rt>でんわ</rt></ruby>をしています。</div><div class=\"cn-text\">林正在打电话。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">SARA</div><div class=\"jp-text\"><ruby>広田<rt>ひろた</rt></ruby>さんは？</div><div class=\"cn-text\">广田呢？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">YAMAMOTO</div><div class=\"jp-text\"><ruby>広田<rt>ひろた</rt></ruby>さんは<ruby>売店<rt>ばいてん</rt></ruby>の<ruby>横<rt>よこ</rt></ruby>でアイスクリームを<ruby>食<rt>た</rt></ruby>べています。</div><div class=\"cn-text\">广田在小卖部旁边吃冰淇淋。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">SARA</div><div class=\"jp-text\"><ruby>木村<rt>きむら</rt></ruby>さんと<ruby>長井<rt>ながい</rt></ruby>さんは？</div><div class=\"cn-text\">木村和长井呢？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">YAMAMOTO</div><div class=\"jp-text\">さあ…。</div><div class=\"cn-text\">这个嘛……</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">SARA</div><div class=\"jp-text\">あっ、あそこです。コーヒーを<ruby>飲<rt>の</rt></ruby>みながら<ruby>話<rt>はな</rt></ruby>しています。</div><div class=\"cn-text\">啊，在那边。他们一边喝咖啡一边聊天。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">ESCORT</div><div class=\"jp-text\">みなさん、<ruby>急<rt>いそ</rt></ruby>いでください。</div><div class=\"cn-text\">大家，请快一点。</div></div>\n    <div class=\"scene-note\" style=\"margin-top:20px\">（下田のホテルで）</div>\n    <div class=\"dialogue-line\" data-idx=\"9\"><div class=\"speaker\">ESCORT</div><div class=\"jp-text\">みなさん、お<ruby>疲<rt>つか</rt></ruby>れさまでした。</div><div class=\"cn-text\">大家辛苦了。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"10\"><div class=\"speaker\">SARA</div><div class=\"jp-text\"><ruby>部屋<rt>へや</rt></ruby>は<ruby>何階<rt>なんかい</rt></ruby>ですか。</div><div class=\"cn-text\">房间在几楼？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"11\"><div class=\"speaker\">ESCORT</div><div class=\"jp-text\"><ruby>女性<rt>じょせい</rt></ruby>は４<ruby>階<rt>かい</rt></ruby>で、<ruby>男性<rt>だんせい</rt></ruby>は３<ruby>階<rt>がい</rt></ruby>です。<ruby>夕食<rt>ゆうしょく</rt></ruby>は７<ruby>時<rt>じ</rt></ruby>からです。それまでゆっくりしてください。</div><div class=\"cn-text\">女性在4楼，男性在3楼。晚饭从7点开始。在那之前请好好休息。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～をしています</div><div class=\"grammar-cn\">正在做～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～の<ruby>横<rt>よこ</rt></ruby>で～を<ruby>食<rt>た</rt></ruby>べています</div><div class=\"grammar-cn\">在～旁边吃～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>飲<rt>の</rt></ruby>みながら<ruby>話<rt>はな</rt></ruby>しています</div><div class=\"grammar-cn\">一边喝～一边聊天</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～は<ruby>何階<rt>なんかい</rt></ruby>ですか</div><div class=\"grammar-cn\">～在几楼？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～は～<ruby>階<rt>かい</rt></ruby>で、～は～<ruby>階<rt>かい</rt></ruby>です</div><div class=\"grammar-cn\">～在～楼，～在～楼</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～からです</div><div class=\"grammar-cn\">从～开始</div></div>","ts":"3.1,8.6,12.5,16.2,18.0,22.7,25.4,26.9,31.9,39.9,42.6,44.9"},{"id":"L11-1","tag":"第11課","title":"私はマリー・マルタンです。","meta":"文化初級日本語 I // p.127 // track 1-2-08","audioFile":"1-2-08.mp3","dialogueHTML":"<div class=\"scene-note\">（自己紹介）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\"><ruby>私<rt>わたし</rt></ruby>はマリー・マルタンです。カナダのトロントから<ruby>来<rt>き</rt></ruby>ました。</div><div class=\"cn-text\">我是玛丽·马尔坦。我从加拿大的多伦多来。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\"><ruby>今<rt>いま</rt></ruby>、<ruby>横浜<rt>よこはま</rt></ruby>に<ruby>住<rt>す</rt></ruby>んでいます。</div><div class=\"cn-text\">现在住在横滨。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\"><ruby>私<rt>わたし</rt></ruby>はカナダの<ruby>高校<rt>こうこう</rt></ruby>を<ruby>卒業<rt>そつぎょう</rt></ruby>してからファッション<ruby>関係<rt>かんけい</rt></ruby>の<ruby>会社<rt>かいしゃ</rt></ruby>に<ruby>勤<rt>つと</rt></ruby>めていました。</div><div class=\"cn-text\">我在加拿大高中毕业后，一直在时尚相关的公司工作。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\"><ruby>今年<rt>ことし</rt></ruby>の３<ruby>月<rt>がつ</rt></ruby>に<ruby>会社<rt>かいしゃ</rt></ruby>を<ruby>辞<rt>や</rt></ruby>めて、<ruby>日本<rt>にほん</rt></ruby>へファッションの
