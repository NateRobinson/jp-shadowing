<ruby>勉強<rt>べんきょう</rt></ruby>をしに<ruby>来<rt>き</rt></ruby>ました。</div><div class=\"cn-text\">今年3月辞了职，来日本学习时尚。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\"><ruby>私<rt>わたし</rt></ruby>は<ruby>自分<rt>じぶん</rt></ruby>でデザインして<ruby>洋服<rt>ようふく</rt></ruby>を<ruby>作<rt>つく</rt></ruby>るのが<ruby>好<rt>す</rt></ruby>きです。</div><div class=\"cn-text\">我喜欢自己设计并制作衣服。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\">いろいろなデザイナーの<ruby>服<rt>ふく</rt></ruby>を<ruby>見<rt>み</rt></ruby>るのも<ruby>好<rt>す</rt></ruby>きで、ときどき<ruby>友達<rt>ともだち</rt></ruby>とファッションショーに<ruby>行<rt>い</rt></ruby>きます。</div><div class=\"cn-text\">也喜欢看各种设计师的服装，偶尔和朋友一起去看时装秀。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\"><ruby>私<rt>わたし</rt></ruby>は<ruby>日本<rt>にほん</rt></ruby>の<ruby>着物<rt>きもの</rt></ruby>にとても<ruby>興味<rt>きょうみ</rt></ruby>があります。</div><div class=\"cn-text\">我对日本的和服非常感兴趣。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\">どうぞよろしくお<ruby>願<rt>ねが</rt></ruby>いします。</div><div class=\"cn-text\">请多多关照。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～から<ruby>来<rt>き</rt></ruby>ました</div><div class=\"grammar-cn\">从～来的</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～に<ruby>住<rt>す</rt></ruby>んでいます</div><div class=\"grammar-cn\">住在～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>卒業<rt>そつぎょう</rt></ruby>してから～に<ruby>勤<rt>つと</rt></ruby>めていました</div><div class=\"grammar-cn\">～毕业后在～工作</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>辞<rt>や</rt></ruby>めて、～しに<ruby>来<rt>き</rt></ruby>ました</div><div class=\"grammar-cn\">辞了～，来做～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～のが<ruby>好<rt>す</rt></ruby>きです</div><div class=\"grammar-cn\">喜欢做～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～にとても<ruby>興味<rt>きょうみ</rt></ruby>があります</div><div class=\"grammar-cn\">对～非常感兴趣</div></div>","ts":"0.4,6.2,9.2,16.2,22.5,27.7,34.2,38.8"},{"id":"L11-2","tag":"第11課","title":"私の家族","meta":"文化初級日本語 I // p.134 // track 1-2-10","audioFile":"1-2-10.mp3","dialogueHTML":"<div class=\"scene-note\">（作文：私の家族）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\"><ruby>私<rt>わたし</rt></ruby>の<ruby>家族<rt>かぞく</rt></ruby>は<ruby>私<rt>わたし</rt></ruby>も<ruby>入<rt>い</rt></ruby>れて<ruby>七人<rt>しちにん</rt></ruby>です。</div><div class=\"cn-text\">我的家人包括我在内一共七个人。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\"><ruby>両親<rt>りょうしん</rt></ruby>と<ruby>兄<rt>あに</rt></ruby>が<ruby>二人<rt>ふたり</rt></ruby>と<ruby>姉<rt>あね</rt></ruby>と<ruby>弟<rt>おとうと</rt></ruby>です。</div><div class=\"cn-text\">有父母、两个哥哥、一个姐姐和一个弟弟。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\">カナダに<ruby>住<rt>す</rt></ruby>んでいますが、<ruby>姉<rt>あね</rt></ruby>は<ruby>結婚<rt>けっこん</rt></ruby>してフランスに<ruby>住<rt>す</rt></ruby>んでいます。</div><div class=\"cn-text\">大家住在加拿大，但姐姐结了婚住在法国。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\"><ruby>父<rt>ちち</rt></ruby>は<ruby>貿易<rt>ぼうえき</rt></ruby><ruby>会社<rt>かいしゃ</rt></ruby>を<ruby>経営<rt>けいえい</rt></ruby>しています。</div><div class=\"cn-text\">父亲经营一家贸易公司。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\"><ruby>母<rt>はは</rt></ruby>は<ruby>学校<rt>がっこう</rt></ruby>の<ruby>教師<rt>きょうし</rt></ruby>です。</div><div class=\"cn-text\">母亲是学校的老师。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\"><ruby>一番目<rt>いちばんめ</rt></ruby>の<ruby>兄<rt>あに</rt></ruby>は<ruby>銀行<rt>ぎんこう</rt></ruby>に<ruby>勤<rt>つと</rt></ruby>めています。</div><div class=\"cn-text\">大哥在银行工作。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\"><ruby>二番目<rt>にばんめ</rt></ruby>の<ruby>兄<rt>あに</rt></ruby>は<ruby>大学<rt>だいがく</rt></ruby>でコンピューターの<ruby>勉強<rt>べんきょう</rt></ruby>をしています。</div><div class=\"cn-text\">二哥在大学学习计算机。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\"><ruby>弟<rt>おとうと</rt></ruby>は<ruby>高校生<rt>こうこうせい</rt></ruby>です。</div><div class=\"cn-text\">弟弟是高中生。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～も<ruby>入<rt>い</rt></ruby>れて～<ruby>人<rt>にん</rt></ruby>です</div><div class=\"grammar-cn\">包括～在内共～人</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～に<ruby>住<rt>す</rt></ruby>んでいます</div><div class=\"grammar-cn\">住在～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～は<ruby>結婚<rt>けっこん</rt></ruby>して～に<ruby>住<rt>す</rt></ruby>んでいます</div><div class=\"grammar-cn\">～结了婚住在～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>経営<rt>けいえい</rt></ruby>しています</div><div class=\"grammar-cn\">经营～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～に<ruby>勤<rt>つと</rt></ruby>めています</div><div class=\"grammar-cn\">在～工作</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～の<ruby>勉強<rt>べんきょう</rt></ruby>をしています</div><div class=\"grammar-cn\">在学习～</div></div>","ts":"5.8,10.2,16.5,23.5,27.2,30.6,35.2,41.3"},{"id":"L11-3","tag":"第11課","title":"デザインの勉強をしたいです。","meta":"文化初級日本語 I // p.135 // track 1-2-12","audioFile":"1-2-12.mp3","dialogueHTML":"<div class=\"scene-note\">（先生とマリーの会話）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">マリーさんはこの<ruby>学校<rt>がっこう</rt></ruby>を<ruby>卒業<rt>そつぎょう</rt></ruby>してからどうしますか。</div><div class=\"cn-text\">玛丽从这所学校毕业后打算做什么？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\">デザインの<ruby>勉強<rt>べんきょう</rt></ruby>をしたいです。</div><div class=\"cn-text\">我想学习设计。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\"><ruby>将来<rt>しょうらい</rt></ruby>、デザイナーになりたいです。</div><div class=\"cn-text\">将来想成为设计师。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">そうですか。もう<ruby>学校<rt>がっこう</rt></ruby>を<ruby>決<rt>き</rt></ruby>めましたか。</div><div class=\"cn-text\">是吗。已经决定好学校了吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\">いいえ、まだはっきり<ruby>決<rt>き</rt></ruby>めていません。</div><div class=\"cn-text\">不，还没有明确决定。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\">でも、<ruby>専門<rt>せんもん</rt></ruby><ruby>学校<rt>がっこう</rt></ruby>に<ruby>入<rt>はい</rt></ruby>りたいです。</div><div class=\"cn-text\">但是，我想进专门学校。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">もうご<ruby>家族<rt>かぞく</rt></ruby>と<ruby>相談<rt>そうだん</rt></ruby>しましたか。</div><div class=\"cn-text\">已经和家人商量过了吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\">いいえ、まだです。</div><div class=\"cn-text\">不，还没有。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">MARIE</div><div class=\"jp-text\">もう<ruby>少<rt>すこ</rt></ruby>し<ruby>調<rt>しら</rt></ruby>べてから<ruby>相談<rt>そうだん</rt></ruby>します。</div><div class=\"cn-text\">想再查一查之后再商量。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>卒業<rt>そつぎょう</rt></ruby>してからどうしますか</div><div class=\"grammar-cn\">～毕业后打算怎么办</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～たいです</div><div class=\"grammar-cn\">想要做～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～になりたいです</div><div class=\"grammar-cn\">想要成为～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">もう～ましたか</div><div class=\"grammar-cn\">已经～了吗</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">まだ～ていません</div><div class=\"grammar-cn\">还没有～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～に<ruby>入<rt>はい</rt></ruby>りたいです</div><div class=\"grammar-cn\">想进入～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～てから～します</div><div class=\"grammar-cn\">做了～之后再～</div></div>","ts":"0.3,4.5,7.2,10.2,14.0,17.0,20.5,23.2,25.2"},{"id":"L12-1","tag":"第12課","title":"フライパンで牛丼を作ります。","meta":"文化初級日本語 I // p.138 // track 1-2-14","audioFile":"1-2-14.mp3","dialogueHTML":"<div class=\"scene-note\">（料理教室で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\"><ruby>今日<rt>きょう</rt></ruby>はフライパンで<ruby>牛丼<rt>ぎゅうどん</rt></ruby>を<ruby>作<rt>つく</rt></ruby>ります。</div><div class=\"cn-text\">今天我们用平底锅做牛肉盖饭。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">みなさん、<ruby>作<rt>つく</rt></ruby>り<ruby>方<rt>かた</rt></ruby>のプリントを<ruby>持<rt>も</rt></ruby>っていますか。</div><div class=\"cn-text\">大家拿到做法的讲义了吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">STUDENTS</div><div class=\"jp-text\">はい、あります。</div><div class=\"cn-text\">是的，拿到了。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">では、<ruby>作<rt>つく</rt></ruby>り<ruby>方<rt>かた</rt></ruby>を<ruby>説明<rt>せつめい</rt></ruby>します。</div><div class=\"cn-text\">那么，我来说明做法。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">まず、たまねぎを<ruby>切<rt>き</rt></ruby>ります。</div><div class=\"cn-text\">首先，切洋葱。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">WAN</div><div class=\"jp-text\"><ruby>先生<rt>せんせい</rt></ruby>、どのくらいの<ruby>大<rt>おお</rt></ruby>きさに<ruby>切<rt>き</rt></ruby>りますか。</div><div class=\"cn-text\">老师，要切成多大呢？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\"><ruby>半分<rt>はんぶん</rt></ruby>に<ruby>切<rt>き</rt></ruby>って、それから<ruby>薄<rt>うす</rt></ruby>く<ruby>切<rt>き</rt></ruby>ります。<ruby>牛肉<rt>ぎゅうにく</rt></ruby>も<ruby>半分<rt>はんぶん</rt></ruby>に<ruby>切<rt>き</rt></ruby>ります。</div><div class=\"cn-text\">先切成两半，然后切成薄片。牛肉也切成两半。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\"><ruby>次<rt>つぎ</rt></ruby>に、フライパンに<ruby>調味料<rt>ちょうみりょう</rt></ruby>を<ruby>入<rt>い</rt></ruby>れます。</div><div class=\"cn-text\">接着，在平底锅里放入调味料。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">ARUN</div><div class=\"jp-text\">すみません、<ruby>先生<rt>せんせい</rt></ruby>。</div><div class=\"cn-text\">不好意思，老师。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"9\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">はい、<ruby>何<rt>なん</rt></ruby>ですか。</div><div class=\"cn-text\">是，什么事？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"10\"><div class=\"speaker\">ARUN</div><div class=\"jp-text\">この<ruby>調味料<rt>ちょうみりょう</rt></ruby>を<ruby>全部<rt>ぜんぶ</rt></ruby><ruby>入<rt>い</rt></ruby>れますか。</div><div class=\"cn-text\">这些调味料全部都放进去吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"11\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">ええ、<ruby>全部<rt>ぜんぶ</rt></ruby><ruby>入<rt>い</rt></ruby>れて、それから<ruby>火<rt>ひ</rt></ruby>をつけてください。</div><div class=\"cn-text\">是的，全部放进去，然后请开火。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"12\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\"><ruby>火<rt>ひ</rt></ruby>の<ruby>強<rt>つよ</rt></ruby>さは<ruby>中火<rt>ちゅうび</rt></ruby>です。</div><div class=\"cn-text\">火的大小是中火。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"13\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">そこにたまねぎを<ruby>入<rt>い</rt></ruby>れて、5<ruby>分<rt>ふん</rt></ruby>ぐらい<ruby>煮<rt>に</rt></ruby>ます。</div><div class=\"cn-text\">在那里面放入洋葱，煮大约5分钟。</div></div>\n    <div class=\"scene-note\" style=\"margin-top:20px\">（料理のあとで）</div>\n    <div class=\"dialogue-line\" data-idx=\"14\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\"><ruby>質問<rt>しつもん</rt></ruby>はありますか。</div><div class=\"cn-text\">有问题吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"15\"><div class=\"speaker\">STUDENTS</div><div class=\"jp-text\">いいえ。</div><div class=\"cn-text\">没有。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"16\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">では、<ruby>今<rt>いま</rt></ruby>からいっしょに<ruby>作<rt>つく</rt></ruby>ります。</div><div class=\"cn-text\">那么，现在一起来做吧。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～で～を<ruby>作<rt>つく</rt></ruby>ります</div><div class=\"grammar-cn\">用～做～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>持<rt>も</rt></ruby>っていますか</div><div class=\"grammar-cn\">有～吗/拿着～吗</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>説明<rt>せつめい</rt></ruby>します</div><div class=\"grammar-cn\">说明～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">どのくらいの<ruby>大<rt>おお</rt></ruby>きさに<ruby>切<rt>き</rt></ruby>りますか</div><div class=\"grammar-cn\">切成多大</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～に<ruby>切<rt>き</rt></ruby>って、それから～く<ruby>切<rt>き</rt></ruby>ります</div><div class=\"grammar-cn\">切成～，然后切成～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～に～を<ruby>入<rt>い</rt></ruby>れます</div><div class=\"grammar-cn\">在～里放入～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>全部<rt>ぜんぶ</rt></ruby><ruby>入<rt>い</rt></ruby>れますか</div><div class=\"grammar-cn\">全部放入～吗</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\"><ruby>火<rt>ひ</rt></ruby>をつけてください</div><div class=\"grammar-cn\">请开火</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～ぐらい<ruby>煮<rt>に</rt></ruby>ます</div><div class=\"grammar-cn\">煮大约～</div></div>","ts":"0.3,3.6,7.2,9.7,12.8,15.3,19.3,23.2,26.2,27.2,29.9,31.9,37.0,41.7,51.6,53.7,55.3"},{"id":"L12-2","tag":"第12課","title":"たまねぎは柔らかくなりましたか。","meta":"文化初級日本語 I // p.143 // track 1-2-18","audioFile":"1-2-18.mp3","dialogueHTML":"<div class=\"scene-note\">（料理教室で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">では、<ruby>始<rt>はじ</rt></ruby>めます。</div><div class=\"cn-text\">那么，开始吧。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">まず、<ruby>牛肉<rt>ぎゅうにく</rt></ruby>と<ruby>野菜<rt>やさい</rt></ruby>を<ruby>切<rt>き</rt></ruby>ってください。</div><div class=\"cn-text\">首先，请把牛肉和蔬菜切好。</div></div>\n    <div class=\"scene-note\" style=\"margin-top:20px\">＊</div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">みなさん、フライパンに<ruby>調味料<rt>ちょうみりょう</rt></ruby>を<ruby>入<rt>い</rt></ruby>れて、<ruby>火<rt>ひ</rt></ruby>をつけましたか。</div><div class=\"cn-text\">大家，调味料放进平底锅里，火点上了吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">WAN</div><div class=\"jp-text\">はい、つけました。</div><div class=\"cn-text\">是的，点上了。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">じゃあ、そこにたまねぎを<ruby>入<rt>い</rt></ruby>れて、5<ruby>分<rt>ふん</rt></ruby>ぐらい<ruby>煮<rt>に</rt></ruby>てください。</div><div class=\"cn-text\">那么，把洋葱放进去，煮大约5分钟。</div></div>\n    <div class=\"scene-note\" style=\"margin-top:20px\">＊</div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">みなさん、たまねぎは<ruby>柔<rt>やわ</rt></ruby>らかくなりましたか。</div><div class=\"cn-text\">大家，洋葱变软了吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">WAN</div><div class=\"jp-text\">はい、<ruby>柔<rt>やわ</rt></ruby>らかくなりました。</div><div class=\"cn-text\">是的，变软了。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">では、<ruby>次<rt>つぎ</rt></ruby>に<ruby>肉<rt>にく</rt></ruby>を<ruby>入<rt>い</rt></ruby>れて、2、3<ruby>分<rt>ぷん</rt></ruby><ruby>煮<rt>に</rt></ruby>てください。</div><div class=\"cn-text\">那么，接下来把肉放进去，煮2、3分钟。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">ARUN</div><div class=\"jp-text\"><ruby>先生<rt>せんせい</rt></ruby>、もういいですか。</div><div class=\"cn-text\">老师，可以了吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"9\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">はい、じゃ、<ruby>火<rt>ひ</rt></ruby>を<ruby>止<rt>と</rt></ruby>めてください。</div><div class=\"cn-text\">是的，请把火关掉。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"10\"><div class=\"speaker\">ARUN</div><div class=\"jp-text\"><ruby>早<rt>はや</rt></ruby>くて<ruby>簡単<rt>かんたん</rt></ruby>ですね。</div><div class=\"cn-text\">又快又简单呢。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"11\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">ええ、<ruby>薄切<rt>うすぎ</rt></ruby>りの<ruby>牛肉<rt>ぎゅうにく</rt></ruby>は<ruby>長<rt>なが</rt></ruby>く<ruby>煮<rt>に</rt></ruby>ると、<ruby>固<rt>かた</rt></ruby>くなります。<ruby>注意<rt>ちゅうい</rt></ruby>してください。</div><div class=\"cn-text\">是的，薄切的牛肉如果煮太久的话，会变硬。请注意。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"12\"><div class=\"speaker\">ARUN</div><div class=\"jp-text\">はい。</div><div class=\"cn-text\">好的。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"13\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">じゃあ、<ruby>温<rt>あたた</rt></ruby>かいごはんの<ruby>上<rt>うえ</rt></ruby>にのせて、その<ruby>上<rt>うえ</rt></ruby>にねぎをのせてください。</div><div class=\"cn-text\">那么，盛到热米饭上面，再在上面放上葱。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"14\"><div class=\"speaker\">ARUN</div><div class=\"jp-text\">このぐらいでいいですか。</div><div class=\"cn-text\">这么多可以吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"15\"><div class=\"speaker\">SENSEI</div><div class=\"jp-text\">はい、いいですよ。これでできあがりです。</div><div class=\"cn-text\">可以的。这样就做好了。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"16\"><div class=\"speaker\">WAN</div><div class=\"jp-text\">わあ、できましたね！</div><div class=\"cn-text\">哇，做好了呢！</div></div>\n    <div class=\"scene-note\" style=\"margin-top:20px\">＊</div>\n    <div class=\"dialogue-line\" data-idx=\"17\"><div class=\"speaker\">WAN / ARUN</div><div class=\"jp-text\">いただきます。</div><div class=\"cn-text\">我开动了。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"18\"><div class=\"speaker\">WAN</div><div class=\"jp-text\">おいしい！</div><div class=\"cn-text\">好好吃！</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>切<rt>き</rt></ruby>ってください</div><div class=\"grammar-cn\">请切～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～に～を<ruby>入<rt>い</rt></ruby>れて、<ruby>火<rt>ひ</rt></ruby>をつけましたか</div><div class=\"grammar-cn\">在～里放入～，火点上了吗</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～ぐらい<ruby>煮<rt>に</rt></ruby>てください</div><div class=\"grammar-cn\">请煮大约～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～は<ruby>柔<rt>やわ</rt></ruby>らかくなりましたか</div><div class=\"grammar-cn\">～变软了吗</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～く<ruby>煮<rt>に</rt></ruby>ると、～くなります</div><div class=\"grammar-cn\">如果煮得～，就会变～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～の<ruby>上<rt>うえ</rt></ruby>にのせて</div><div class=\"grammar-cn\">放在～上面</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">このぐらいでいいですか</div><div class=\"grammar-cn\">这么多可以吗</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">これでできあがりです</div><div class=\"grammar-cn\">这样就做好了</div></div>","ts":"0.3,2.2,6.8,10.7,15.5,28.2,31.9,34.6,44.6,47.5,52.8,55.0,61.8,63.3,70.5,72.8,77.0,81.2,83.9"},{"id":"L13-1","tag":"第13課","title":"大学生活はどうですか。","meta":"文化初級日本語 I // p.148 // track 1-2-21","audioFile":"1-2-21.mp3","dialogueHTML":"<div class=\"scene-note\">（東都大学で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">LEE / RAHUL</div><div class=\"jp-text\">すみません。</div><div class=\"cn-text\">不好意思。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">TANAKA / KATO</div><div class=\"jp-text\">はい。</div><div class=\"cn-text\">是。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">LEE</div><div class=\"jp-text\"><ruby>私<rt>わたし</rt></ruby>たちは<ruby>日本語<rt>にほんご</rt></ruby><ruby>学校<rt>がっこう</rt></ruby>で<ruby>勉強<rt>べんきょう</rt></ruby>している<ruby>学生<rt>がくせい</rt></ruby>です。<ruby>今<rt>いま</rt></ruby>、<ruby>日本人<rt>にほんじん</rt></ruby><ruby>学生<rt>がくせい</rt></ruby>にインタビューをしています。</div><div class=\"cn-text\">我们是在日语学校学习的学生。现在正在对日本大学生做采访。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">LEE</div><div class=\"jp-text\">ちょっと<ruby>質問<rt>しつもん</rt></ruby>してもいいですか。</div><div class=\"cn-text\">可以问几个问题吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">TANAKA / KATO</div><div class=\"jp-text\">ええ、<ruby>何<rt>なん</rt></ruby>ですか。</div><div class=\"cn-text\">好的，什么事？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">LEE</div><div class=\"jp-text\"><ruby>大学<rt>だいがく</rt></ruby><ruby>生活<rt>せいかつ</rt></ruby>はどうですか。</div><div class=\"cn-text\">大学生活怎么样？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">TANAKA</div><div class=\"jp-text\"><ruby>友達<rt>ともだち</rt></ruby>ができましたから、<ruby>楽<rt>たの</rt></ruby>しいです。</div><div class=\"cn-text\">交到了朋友，很开心。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">LEE</div><div class=\"jp-text\">そうですか。<ruby>何<rt>なに</rt></ruby><ruby>学部<rt>がくぶ</rt></ruby>ですか。</div><div class=\"cn-text\">是吗。是什么学部？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">TANAKA</div><div class=\"jp-text\"><ruby>経済<rt>けいざい</rt></ruby><ruby>学部<rt>がくぶ</rt></ruby>です。</div><div class=\"cn-text\">经济学部。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"9\"><div class=\"speaker\">KATO</div><div class=\"jp-text\"><ruby>理<rt>り</rt></ruby><ruby>学部<rt>がくぶ</rt></ruby>です。</div><div class=\"cn-text\">理学部。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"10\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\"><ruby>授業<rt>じゅぎょう</rt></ruby>は<ruby>大変<rt>たいへん</rt></ruby>ですか。</div><div class=\"cn-text\">课程辛苦吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"11\"><div class=\"speaker\">TANAKA</div><div class=\"jp-text\">はい。</div><div class=\"cn-text\">是的。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"12\"><div class=\"speaker\">TANAKA</div><div class=\"jp-text\"><ruby>大変<rt>たいへん</rt></ruby>ですが、おもしろいです。</div><div class=\"cn-text\">虽然辛苦，但很有趣。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"13\"><div class=\"speaker\">KATO</div><div class=\"jp-text\"><ruby>私<rt>わたし</rt></ruby>も<ruby>大変<rt>たいへん</rt></ruby>です。</div><div class=\"cn-text\">我也很辛苦。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"14\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">どうしてですか。</div><div class=\"cn-text\">为什么呢？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"15\"><div class=\"speaker\">KATO</div><div class=\"jp-text\">レポートが<ruby>多<rt>おお</rt></ruby>いからです。</div><div class=\"cn-text\">因为报告很多。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～している<ruby>学生<rt>がくせい</rt></ruby>です</div><div class=\"grammar-cn\">是正在做～的学生</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～にインタビューをしています</div><div class=\"grammar-cn\">正在对～做采访</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～してもいいですか</div><div class=\"grammar-cn\">可以做～吗</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～はどうですか</div><div class=\"grammar-cn\">～怎么样</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～ができましたから、～です</div><div class=\"grammar-cn\">因为～了，所以～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～ですが、～です</div><div class=\"grammar-cn\">虽然～，但是～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">どうしてですか</div><div class=\"grammar-cn\">为什么</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～が<ruby>多<rt>おお</rt></ruby>いからです</div><div class=\"grammar-cn\">因为～很多</div></div>","ts":"0.5,4.3,5.8,11.8,15.8,18.8,21.2,24.1,27.5,28.7,30.8,32.6,34.7,37.4,41.5,43.6"},{"id":"L13-2","tag":"第13課","title":"どう思いますか。","meta":"文化初級日本語 I // p.153 // track 1-2-24","audioFile":"1-2-24.mp3","dialogueHTML":"<div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\"><ruby>暇<rt>ひま</rt></ruby>な<ruby>時<rt>とき</rt></ruby>は、<ruby>何<rt>なに</rt></ruby>をしますか。</div><div class=\"cn-text\">空闲的时候做什么？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">TANAKA</div><div class=\"jp-text\">よく<ruby>友達<rt>ともだち</rt></ruby>とショッピングに<ruby>行<rt>い</rt></ruby>きます。</div><div class=\"cn-text\">经常和朋友去购物。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">KATO</div><div class=\"jp-text\"><ruby>私<rt>わたし</rt></ruby>はスポーツをします。</div><div class=\"cn-text\">我做运动。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">どんなスポーツをしますか。</div><div class=\"cn-text\">做什么运动？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">KATO</div><div class=\"jp-text\">バスケットボールです。</div><div class=\"cn-text\">篮球。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">そうですか。</div><div class=\"cn-text\">是吗。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">ところで、この<ruby>学校<rt>がっこう</rt></ruby>の<ruby>施設<rt>しせつ</rt></ruby>をどう<ruby>思<rt>おも</rt></ruby>いますか。</div><div class=\"cn-text\">对了，你们觉得这所学校的设施怎么样？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">TANAKA</div><div class=\"jp-text\"><ruby>図書館<rt>としょかん</rt></ruby>が<ruby>新<rt>あたら</rt></ruby>しいから、いいと<ruby>思<rt>おも</rt></ruby>います。</div><div class=\"cn-text\">图书馆很新，我觉得很好。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">KATO</div><div class=\"jp-text\"><ruby>食堂<rt>しょくどう</rt></ruby>は<ruby>安<rt>やす</rt></ruby>くておいしいから、よく<ruby>行<rt>い</rt></ruby>きます。</div><div class=\"cn-text\">食堂又便宜又好吃，我经常去。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"9\"><div class=\"speaker\">TANAKA</div><div class=\"jp-text\"><ruby>食堂<rt>しょくどう</rt></ruby>のソフトクリームはとてもおいしいですよ。</div><div class=\"cn-text\">食堂的软冰淇淋也非常好吃哦。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\"><ruby>暇<rt>ひま</rt></ruby>な<ruby>時<rt>とき</rt></ruby>は、<ruby>何<rt>なに</rt></ruby>をしますか</div><div class=\"grammar-cn\">在空闲的时候做什么</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">よく～に<ruby>行<rt>い</rt></ruby>きます</div><div class=\"grammar-cn\">经常去～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">どんな～をしますか</div><div class=\"grammar-cn\">做什么样的～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～をどう<ruby>思<rt>おも</rt></ruby>いますか</div><div class=\"grammar-cn\">你觉得～怎么样</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～が～から、いいと<ruby>思<rt>おも</rt></ruby>います</div><div class=\"grammar-cn\">因为～，我觉得很好</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～は～くて～から、よく～ます</div><div class=\"grammar-cn\">因为～又～又～，所以经常～</div></div>","ts":"3.2,6.2,10.0,12.5,14.7,16.1,18.3,23.1,27.3,31.2"},{"id":"L13-3","tag":"第13課","title":"日本の大学生の生活について発表します。","meta":"文化初級日本語 I // p.156 // track 1-2-27","audioFile":"1-2-27.mp3","dialogueHTML":"<div class=\"scene-note\">（<ruby>日本語<rt>にほんご</rt></ruby><ruby>学校<rt>がっこう</rt></ruby>の<ruby>教室<rt>きょうしつ</rt></ruby>で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">LEE</div><div class=\"jp-text\"><ruby>私<rt>わたし</rt></ruby>たちは<ruby>日本<rt>にほん</rt></ruby>の<ruby>大学生<rt>だいがくせい</rt></ruby>の<ruby>生活<rt>せいかつ</rt></ruby>について<ruby>発表<rt>はっぴょう</rt></ruby>します。</div><div class=\"cn-text\">我们来发表关于日本大学生生活的调查。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">LEE</div><div class=\"jp-text\"><ruby>私<rt>わたし</rt></ruby>たちは<ruby>東都大学<rt>とうとだいがく</rt></ruby>で<ruby>日本人<rt>にほんじん</rt></ruby>の<ruby>学生<rt>がくせい</rt></ruby>10<ruby>人<rt>にん</rt></ruby>に<ruby>質問<rt>しつもん</rt></ruby>しました。</div><div class=\"cn-text\">我们在东都大学向10名日本学生进行了提问。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">LEE</div><div class=\"jp-text\">まず、このグラフを<ruby>見<rt>み</rt></ruby>てください。</div><div class=\"cn-text\">首先，请看这个图表。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">LEE</div><div class=\"jp-text\"><ruby>質問<rt>しつもん</rt></ruby>1は「<ruby>大学<rt>だいがく</rt></ruby><ruby>生活<rt>せいかつ</rt></ruby>はどうですか。」です。</div><div class=\"cn-text\">问题1是\"大学生活怎么样？\"</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">LEE</div><div class=\"jp-text\">「<ruby>楽<rt>たの</rt></ruby>しい。」は7<ruby>人<rt>にん</rt></ruby>でした。</div><div class=\"cn-text\">\"快乐\"有7人。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">LEE</div><div class=\"jp-text\"><ruby>理由<rt>りゆう</rt></ruby>は「<ruby>友達<rt>ともだち</rt></ruby>がたくさんいる。」が3<ruby>人<rt>にん</rt></ruby>、「サークルが<ruby>楽<rt>たの</rt></ruby>しい。」が2<ruby>人<rt>にん</rt></ruby>、「<ruby>勉強<rt>べんきょう</rt></ruby>がおもしろい。」が2<ruby>人<rt>にん</rt></ruby>でした。</div><div class=\"cn-text\">理由是\"有很多朋友\"3人，\"社团活动很有趣\"2人，\"学习很有意思\"2人。</div></div>\n    <div class=\"scene-note\" style=\"margin-top:20px\">＊</div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\"><ruby>質問<rt>しつもん</rt></ruby>3は「<ruby>暇<rt>ひま</rt></ruby>な<ruby>時<rt>とき</rt></ruby>は、<ruby>何<rt>なに</rt></ruby>をしますか。」です。</div><div class=\"cn-text\">问题3是\"空闲时做什么？\"</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">「<ruby>家<rt>いえ</rt></ruby>でDVDなどを<ruby>見<rt>み</rt></ruby>る。」が4<ruby>人<rt>にん</rt></ruby>、「<ruby>買<rt>か</rt></ruby>い<ruby>物<rt>もの</rt></ruby>に<ruby>行<rt>い</rt></ruby>く。」が3<ruby>人<rt>にん</rt></ruby>、「<ruby>友達<rt>ともだち</rt></ruby>とカラオケに<ruby>行<rt>い</rt></ruby>く。」が2<ruby>人<rt>にん</rt></ruby>でした。</div><div class=\"cn-text\">\"在家看DVD等\"有4人，\"去购物\"有3人，\"和朋友去卡拉OK\"有2人。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\">「スポーツをする。」は1<ruby>人<rt>にん</rt></ruby>だけでした。</div><div class=\"cn-text\">\"做运动\"只有1人。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"9\"><div class=\"speaker\">RAHUL</div><div class=\"jp-text\"><ruby>私<rt>わたし</rt></ruby>の<ruby>国<rt>くに</rt></ruby>の<ruby>大学生<rt>だいがくせい</rt></ruby>はよくスポーツをしますが、<ruby>日本人<rt>にほんじん</rt></ruby>はあまりしないから、<ruby>驚<rt>おどろ</rt></ruby>きました。</div><div class=\"cn-text\">我们国家的大学生经常做运动，但日本人不怎么做，所以我很惊讶。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～について<ruby>発表<rt>はっぴょう</rt></ruby>します</div><div class=\"grammar-cn\">关于～进行发表</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～に<ruby>質問<rt>しつもん</rt></ruby>しました</div><div class=\"grammar-cn\">向～提问了</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>見<rt>み</rt></ruby>てください</div><div class=\"grammar-cn\">请看～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～は～<ruby>人<rt>にん</rt></ruby>でした</div><div class=\"grammar-cn\">～有～人</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\"><ruby>理由<rt>りゆう</rt></ruby>は～が～<ruby>人<rt>にん</rt></ruby></div><div class=\"grammar-cn\">理由是～有～人</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～だけでした</div><div class=\"grammar-cn\">只有～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～しますが、～しないから、<ruby>驚<rt>おどろ</rt></ruby>きました</div><div class=\"grammar-cn\">虽然做～，但不怎么做～，所以很惊讶</div></div>","ts":"0.5,4.4,11.3,14.0,19.2,23.1,50.8,57.1,71.4,76.9"},{"id":"L14-1","tag":"第14課","title":"3時17分に熱海に着いた。","meta":"文化初級日本語 I // p.158 // track 1-2-29","audioFile":"1-2-29.mp3","dialogueHTML":"<div class=\"scene-note\">サラさんの<ruby>日記<rt>にっき</rt></ruby> — 5<ruby>月<rt>がつ</rt></ruby>10<ruby>日<rt>にち</rt></ruby>（<ruby>土<rt>ど</rt></ruby>）くもり</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">SARA</div><div class=\"jp-text\">5<ruby>月<rt>がつ</rt></ruby>10<ruby>日<rt>にち</rt></ruby>、<ruby>土曜日<rt>どようび</rt></ruby>、くもり。</div><div class=\"cn-text\">5月10日，周六，阴天。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">SARA</div><div class=\"jp-text\"><ruby>今<rt>いま</rt></ruby>、<ruby>下田<rt>しもだ</rt></ruby>のホテルにいる。</div><div class=\"cn-text\">现在在下田的酒店里。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">SARA</div><div class=\"jp-text\">こだま663<ruby>号<rt>ごう</rt></ruby>に<ruby>乗<rt>の</rt></ruby>って、2<ruby>時<rt>じ</rt></ruby>26<ruby>分<rt>ぷん</rt></ruby>に<ruby>東京<rt>とうきょう</rt></ruby>を<ruby>出<rt>で</rt></ruby>て、3<ruby>時<rt>じ</rt></ruby>17<ruby>分<rt>ふん</rt></ruby>に<ruby>熱海<rt>あたみ</rt></ruby>に<ruby>着<rt>つ</rt></ruby>いた。</div><div class=\"cn-text\">坐光号663次列车，2点26分从东京出发，3点17分到达了热海。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">SARA</div><div class=\"jp-text\">そして、<ruby>熱海<rt>あたみ</rt></ruby>からここまでバスで<ruby>来<rt>き</rt></ruby>た。</div><div class=\"cn-text\">然后从热海坐巴士来到了这里。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">SARA</div><div class=\"jp-text\"><ruby>途中<rt>とちゅう</rt></ruby>、<ruby>伊豆<rt>いず</rt></ruby>で10<ruby>分<rt>ぷん</rt></ruby><ruby>休憩<rt>きゅうけい</rt></ruby>した。</div><div class=\"cn-text\">途中在伊豆休息了10分钟。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">SARA</div><div class=\"jp-text\"><ruby>休憩<rt>きゅうけい</rt></ruby><ruby>時間<rt>じかん</rt></ruby>が<ruby>短<rt>みじか</rt></ruby>かったので、<ruby>私<rt>わたし</rt></ruby>はバスを<ruby>降<rt>お</rt></ruby>りなかった。</div><div class=\"cn-text\">因为休息时间很短，我没有下车。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">SARA</div><div class=\"jp-text\"><ruby>林<rt>はやし</rt></ruby>さんたちは、<ruby>集合<rt>しゅうごう</rt></ruby><ruby>時間<rt>じかん</rt></ruby>に<ruby>少<rt>すこ</rt></ruby>し<ruby>遅<rt>おく</rt></ruby>れた。</div><div class=\"cn-text\">林同学他们集合时间稍微迟到了一点。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">SARA</div><div class=\"jp-text\">5<ruby>時<rt>じ</rt></ruby>30<ruby>分<rt>ぷん</rt></ruby>にこのホテルに<ruby>着<rt>つ</rt></ruby>いた。</div><div class=\"cn-text\">5点30分到达了这家酒店。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">SARA</div><div class=\"jp-text\"><ruby>疲<rt>つか</rt></ruby>れたので、みんなですぐ<ruby>温泉<rt>おんせん</rt></ruby>に<ruby>入<rt>はい</rt></ruby>った。</div><div class=\"cn-text\">因为很累，大家马上就去泡了温泉。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"9\"><div class=\"speaker\">SARA</div><div class=\"jp-text\">お<ruby>湯<rt>ゆ</rt></ruby>はちょっと<ruby>熱<rt>あつ</rt></ruby>かったが、<ruby>気持<rt>きも</rt></ruby>ちがよかった。</div><div class=\"cn-text\">水温虽然有点烫，但感觉很舒服。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"10\"><div class=\"speaker\">SARA</div><div class=\"jp-text\">あまり<ruby>人<rt>ひと</rt></ruby>がいなかったので、<ruby>静<rt>しず</rt></ruby>かだった。</div><div class=\"cn-text\">因为没什么人，很安静。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"11\"><div class=\"speaker\">SARA</div><div class=\"jp-text\"><ruby>晩<rt>ばん</rt></ruby>ごはんのおかずは<ruby>魚<rt>さかな</rt></ruby>で、<ruby>見<rt>み</rt></ruby>たことのないものもあった。</div><div class=\"cn-text\">晚饭的菜是鱼，还有没见过的东西。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"12\"><div class=\"speaker\">SARA</div><div class=\"jp-text\">とてもおいしかった。でも、<ruby>魚<rt>さかな</rt></ruby>は<ruby>食<rt>た</rt></ruby>べにくかった。</div><div class=\"cn-text\">非常好吃。不过鱼不太好吃。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"13\"><div class=\"speaker\">SARA</div><div class=\"jp-text\"><ruby>明日<rt>あした</rt></ruby>は<ruby>博物館<rt>はくぶつかん</rt></ruby>に<ruby>行<rt>い</rt></ruby>く。</div><div class=\"cn-text\">明天去博物馆。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～に<ruby>着<rt>つ</rt></ruby>いた</div><div class=\"grammar-cn\">到达了～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～<ruby>号<rt>ごう</rt></ruby>に<ruby>乗<rt>の</rt></ruby>って</div><div class=\"grammar-cn\">坐～号（列车）</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>出<rt>で</rt></ruby>て</div><div class=\"grammar-cn\">从～出发</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～から～までバスで<ruby>来<rt>き</rt></ruby>た</div><div class=\"grammar-cn\">从～坐巴士来到～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～ので、～なかった</div><div class=\"grammar-cn\">因为～，所以没有～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～たので、～た</div><div class=\"grammar-cn\">因为～了，所以～了</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～かったが、～かった</div><div class=\"grammar-cn\">虽然～，但是～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\"><ruby>見<rt>み</rt></ruby>たことのないもの</div><div class=\"grammar-cn\">没见过的东西</div></div>","ts":"0.0,5.2,8.8,18.4,23.4,27.8,33.4,38.8,42.8,47.9,52.3,57.3,62.8,66.4"},{"id":"L14-2","tag":"第14課","title":"本当に楽しい旅行だった。","meta":"文化初級日本語 I // p.163 // track 1-2-31","audioFile":"1-2-31.mp3","dialogueHTML":"<div class=\"scene-note\">サラさんの<ruby>日記<rt>にっき</rt></ruby> — 5<ruby>月<rt>がつ</rt></ruby>11<ruby>日<rt>にち</rt></ruby>（<ruby>日<rt>にち</rt></ruby>）<ruby>晴<rt>は</rt></ruby>れ</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">SARA</div><div class=\"jp-text\">5<ruby>月<rt>がつ</rt></ruby>11<ruby>日<rt>にち</rt></ruby>、<ruby>日曜日<rt>にちようび</rt></ruby>、<ruby>晴<rt>は</rt></ruby>れ。</div><div class=\"cn-text\">5月11日，周日，晴天。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">SARA</div><div class=\"jp-text\"><ruby>昨日<rt>きのう</rt></ruby>はあまりいい<ruby>天気<rt>てんき</rt></ruby>ではなかったが、<ruby>今日<rt>きょう</rt></ruby>は<ruby>朝<rt>あさ</rt></ruby>からずっといい<ruby>天気<rt>てんき</rt></ruby>だった。</div><div class=\"cn-text\">昨天天气不太好，但今天从早上开始一直是好天气。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">SARA</div><div class=\"jp-text\">7<ruby>時<rt>じ</rt></ruby>に<ruby>起<rt>お</rt></ruby>きて、<ruby>広田<rt>ひろた</rt></ruby>さんと<ruby>山本<rt>やまもと</rt></ruby>さんと<ruby>温泉<rt>おんせん</rt></ruby>に<ruby>入<rt>はい</rt></ruby>った。</div><div class=\"cn-text\">7点起床，和广田、山本一起泡了温泉。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">SARA</div><div class=\"jp-text\">そして<ruby>朝<rt>あさ</rt></ruby>ごはんを<ruby>食<rt>た</rt></ruby>べて、バスで<ruby>植物園<rt>しょくぶつえん</rt></ruby>へ<ruby>行<rt>い</rt></ruby>った。</div><div class=\"cn-text\">然后吃了早饭，坐巴士去了植物园。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">SARA</div><div class=\"jp-text\"><ruby>植物園<rt>しょくぶつえん</rt></ruby>はあまり<ruby>広<rt>ひろ</rt></ruby>くなかったが、<ruby>珍<rt>めずら</rt></ruby>しい<ruby>花<rt>はな</rt></ruby>がたくさんあった。</div><div class=\"cn-text\">植物园虽然不太大，但有很多珍奇的花。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">SARA</div><div class=\"jp-text\"><ruby>私<rt>わたし</rt></ruby>は<ruby>花<rt>はな</rt></ruby>のスケッチをしたり、<ruby>植物園<rt>しょくぶつえん</rt></ruby>の<ruby>人<rt>ひと</rt></ruby>にいろいろ<ruby>質問<rt>しつもん</rt></ruby>したりした。</div><div class=\"cn-text\">我画了花的素描，还向植物园的人问了很多问题。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">SARA</div><div class=\"jp-text\"><ruby>夜<rt>よる</rt></ruby>7<ruby>時<rt>じ</rt></ruby>に<ruby>東京<rt>とうきょう</rt></ruby>に<ruby>着<rt>つ</rt></ruby>いた。</div><div class=\"cn-text\">晚上7点到达了东京。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">SARA</div><div class=\"jp-text\"><ruby>帰<rt>かえ</rt></ruby>りはずっとバスだったので、ちょっと<ruby>疲<rt>つか</rt></ruby>れた。</div><div class=\"cn-text\">回程一直坐巴士，有点累。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">SARA</div><div class=\"jp-text\">でも、<ruby>本当<rt>ほんとう</rt></ruby>に<ruby>楽<rt>たの</rt></ruby>しい<ruby>旅行<rt>りょこう</rt></ruby>だった。</div><div class=\"cn-text\">不过，真的是一次很快乐的旅行。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～ではなかったが、～だった</div><div class=\"grammar-cn\">虽然不是～，但是～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～からずっと～だった</div><div class=\"grammar-cn\">从～开始一直～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～て、～と～に<ruby>入<rt>はい</rt></ruby>った</div><div class=\"grammar-cn\">～然后和～一起进入了～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～たり、～たりした</div><div class=\"grammar-cn\">又做了～，又做了～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～だったので、～た</div><div class=\"grammar-cn\">因为是～，所以～了</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\"><ruby>本当<rt>ほんとう</rt></ruby>に～だった</div><div class=\"grammar-cn\">真的是～</div></div>","ts":"0.0,5.8,12.4,17.8,23.7,30.8,37.9,40.9,45.3"},{"id":"L15-1","tag":"第15課","title":"どちらのほうが近いですか。","meta":"文化初級日本語 I // p.166 // track 1-2-33","audioFile":"1-2-33.mp3","dialogueHTML":"<div class=\"scene-note\">（<ruby>不動産屋<rt>ふどうさんや</rt></ruby>で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">AGENT</div><div class=\"jp-text\">このアパートは<ruby>中野<rt>なかの</rt></ruby>と<ruby>新中野<rt>しんなかの</rt></ruby>の<ruby>間<rt>あいだ</rt></ruby>です。</div><div class=\"cn-text\">这间公寓在中野和新中野之间。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\"><ruby>中野<rt>なかの</rt></ruby>と<ruby>新中野<rt>しんなかの</rt></ruby>とどちらのほうが<ruby>近<rt>ちか</rt></ruby>いですか。</div><div class=\"cn-text\">中野和新中野哪边比较近？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">AGENT</div><div class=\"jp-text\"><ruby>中野<rt>なかの</rt></ruby>のほうがちょっと<ruby>近<rt>ちか</rt></ruby>いです。</div><div class=\"cn-text\">中野那边稍微近一点。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">AGENT</div><div class=\"jp-text\">でも、どちらもだいたい<ruby>同<rt>おな</rt></ruby>じぐらいですよ。</div><div class=\"cn-text\">不过两边差不多一样远。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\"><ruby>中野<rt>なかの</rt></ruby>の<ruby>駅前<rt>えきまえ</rt></ruby>と<ruby>新中野<rt>しんなかの</rt></ruby>の<ruby>駅前<rt>えきまえ</rt></ruby>とどちらのほうがにぎやかですか。</div><div class=\"cn-text\">中野站前和新中野站前，哪边比较热闹？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">AGENT</div><div class=\"jp-text\"><ruby>中野<rt>なかの</rt></ruby>のほうがずっとにぎやかです。</div><div class=\"cn-text\">中野那边热闹得多。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">AGENT</div><div class=\"jp-text\"><ruby>北口<rt>きたぐち</rt></ruby>に<ruby>大<rt>おお</rt></ruby>きい<ruby>商店街<rt>しょうてんがい</rt></ruby>がありますよ。</div><div class=\"cn-text\">北口有很大的商店街哦。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">そうですか。<ruby>家賃<rt>やちん</rt></ruby>はいくらですか。</div><div class=\"cn-text\">是吗。房租多少？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">AGENT</div><div class=\"jp-text\">8<ruby>万<rt>まん</rt></ruby><ruby>円<rt>えん</rt></ruby>です。</div><div class=\"cn-text\">8万日元。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"9\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">ちょっと<ruby>高<rt>たか</rt></ruby>いですね。</div><div class=\"cn-text\">有点贵呢。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～と～の<ruby>間<rt>あいだ</rt></ruby>です</div><div class=\"grammar-cn\">在～和～之间</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～と～とどちらのほうが～ですか</div><div class=\"grammar-cn\">～和～哪个比较～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～のほうが～です</div><div class=\"grammar-cn\">～那边比较～</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">どちらもだいたい<ruby>同<rt>おな</rt></ruby>じぐらいです</div><div class=\"grammar-cn\">两边差不多一样</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～のほうがずっと～です</div><div class=\"grammar-cn\">～要～得多</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\"><ruby>家賃<rt>やちん</rt></ruby>はいくらですか</div><div class=\"grammar-cn\">房租多少</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">ちょっと<ruby>高<rt>たか</rt></ruby>いですね</div><div class=\"grammar-cn\">有点贵呢</div></div>","ts":"4.9,9.4,13.6,16.3,19.7,25.3,27.8,30.9,33.9,35.3"},{"id":"L15-2","tag":"第15課","title":"駅から遠すぎます。","meta":"文化初級日本語 I // p.170 // track 1-2-36","audioFile":"1-2-36.mp3","dialogueHTML":"<div class=\"scene-note\">（不動産屋で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">AGENT</div><div class=\"jp-text\">じゃあ、この<ruby>三鷹<rt>みたか</rt></ruby>のアパートはどうですか。6<ruby>万<rt>まん</rt></ruby><ruby>円<rt>えん</rt></ruby>です。</div><div class=\"cn-text\">那这间三鹰的公寓怎么样？6万日元。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">そうですねえ、<ruby>駅<rt>えき</rt></ruby>から<ruby>近<rt>ちか</rt></ruby>いですか。</div><div class=\"cn-text\">嗯……离车站近吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">AGENT</div><div class=\"jp-text\">いいえ、ちょっと<ruby>遠<rt>とお</rt></ruby>いです。</div><div class=\"cn-text\">不，有点远。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">AGENT</div><div class=\"jp-text\"><ruby>三鷹<rt>みたか</rt></ruby><ruby>駅<rt>えき</rt></ruby>の<ruby>南口<rt>みなみぐち</rt></ruby>から<ruby>歩<rt>ある</rt></ruby>いて20<ruby>分<rt>ぷん</rt></ruby>です。</div><div class=\"cn-text\">从三鹰车站南口走路要20分钟。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\"><ruby>駅<rt>えき</rt></ruby>までのバスはありますか。</div><div class=\"cn-text\">有到车站的公交吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">AGENT</div><div class=\"jp-text\">ええ、たくさんありますよ。</div><div class=\"cn-text\">有的，很多班次哦。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">AGENT</div><div class=\"jp-text\">それに、バス<ruby>停<rt>てい</rt></ruby>からアパートまで1<ruby>分<rt>ぷん</rt></ruby>です。</div><div class=\"cn-text\">而且从公交站到公寓只要1分钟。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">そうですか。</div><div class=\"cn-text\">是吗。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">でも、ちょっと<ruby>駅<rt>えき</rt></ruby>から<ruby>遠<rt>とお</rt></ruby>すぎます。</div><div class=\"cn-text\">可是，离车站也太远了。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～はどうですか。</div><div class=\"grammar-cn\">～怎么样？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～から<ruby>近<rt>ちか</rt></ruby>いですか。</div><div class=\"grammar-cn\">离～近吗？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～から<ruby>歩<rt>ある</rt></ruby>いて～<ruby>分<rt>ふん</rt></ruby>です。</div><div class=\"grammar-cn\">从～走路要～分钟。</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～までのバスはありますか。</div><div class=\"grammar-cn\">有到～的公交吗？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～から～まで～<ruby>分<rt>ふん</rt></ruby>です。</div><div class=\"grammar-cn\">从～到～要～分钟。</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～すぎます。</div><div class=\"grammar-cn\">太～了。</div></div>","ts":"3.2,9.5,11.5,14.2,17.9,20.5,22.1,25.7,27.6"},{"id":"L15-3","tag":"第15課","title":"どれがいちばん静かですか。","meta":"文化初級日本語 I // p.171 // track 1-2-39","audioFile":"1-2-39.mp3","dialogueHTML":"<div class=\"scene-note\">（不動産屋で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">AGENT</div><div class=\"jp-text\">じゃあ、これはどうですか。<ruby>池袋<rt>いけぶくろ</rt></ruby><ruby>駅<rt>えき</rt></ruby>から<ruby>歩<rt>ある</rt></ruby>いて4<ruby>分<rt>ぷん</rt></ruby>です。</div><div class=\"cn-text\">那这间怎么样？从池袋车站走路4分钟。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">AGENT</div><div class=\"jp-text\">6<ruby>畳<rt>じょう</rt></ruby>の<ruby>洋室<rt>ようしつ</rt></ruby>と6<ruby>畳<rt>じょう</rt></ruby>のダイニングキッチンです。</div><div class=\"cn-text\">有6叠的西式房间和6叠的餐厅厨房。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">AGENT</div><div class=\"jp-text\"><ruby>使<rt>つか</rt></ruby>いやすいと<ruby>思<rt>おも</rt></ruby>います。</div><div class=\"cn-text\">我觉得很方便实用。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">いくらですか。</div><div class=\"cn-text\">多少钱？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">AGENT</div><div class=\"jp-text\">7<ruby>万<rt>まん</rt></ruby><ruby>円<rt>えん</rt></ruby>です。でも、ちょっと<ruby>古<rt>ふる</rt></ruby>いです。</div><div class=\"cn-text\">7万日元。不过有点旧。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">そうですか。</div><div class=\"cn-text\">是吗。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">あのう、<ruby>中野<rt>なかの</rt></ruby>と<ruby>三鷹<rt>みたか</rt></ruby>と<ruby>池袋<rt>いけぶくろ</rt></ruby>の<ruby>部屋<rt>へや</rt></ruby>の<ruby>中<rt>なか</rt></ruby>で、どれがいちばん<ruby>静<rt>しず</rt></ruby>かですか。</div><div class=\"cn-text\">请问，中野、三鹰和池袋的房间里面，哪间最安静？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">AGENT</div><div class=\"jp-text\"><ruby>中野<rt>なかの</rt></ruby>の<ruby>部屋<rt>へや</rt></ruby>がいちばん<ruby>静<rt>しず</rt></ruby>かだと<ruby>思<rt>おも</rt></ruby>います。</div><div class=\"cn-text\">我觉得中野的房间最安静。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"8\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">そうですか、それにします。</div><div class=\"cn-text\">是吗，那就选那间吧。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～から<ruby>歩<rt>ある</rt></ruby>いて～<ruby>分<rt>ふん</rt></ruby>です。</div><div class=\"grammar-cn\">从～走路～分钟。</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～と<ruby>思<rt>おも</rt></ruby>います。</div><div class=\"grammar-cn\">我觉得～。</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～の<ruby>中<rt>なか</rt></ruby>で、どれがいちばん～ですか。</div><div class=\"grammar-cn\">在～当中，哪个最～？</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～がいちばん～だと<ruby>思<rt>おも</rt></ruby>います。</div><div class=\"grammar-cn\">我觉得～最～。</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">それにします。</div><div class=\"grammar-cn\">就选那个。</div></div>","ts":"3.9,10.0,14.0,15.9,17.1,21.1,22.5,29.1,32.3"},{"id":"L15-4","tag":"第15課","title":"この中野の部屋は台所が広いです。","meta":"文化初級日本語 I // p.176 // track 1-2-42","audioFile":"1-2-42.mp3","dialogueHTML":"<div class=\"scene-note\">（不動産屋で）</div>\n    <div class=\"dialogue-line\" data-idx=\"0\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">この<ruby>中野<rt>なかの</rt></ruby>の<ruby>部屋<rt>へや</rt></ruby>は<ruby>台所<rt>だいどころ</rt></ruby>が<ruby>広<rt>ひろ</rt></ruby>いですね。</div><div class=\"cn-text\">这间中野的房间厨房很大呢。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"1\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">それに、この<ruby>部屋<rt>へや</rt></ruby>は<ruby>三鷹<rt>みたか</rt></ruby>の<ruby>部屋<rt>へや</rt></ruby>より<ruby>駅<rt>えき</rt></ruby>から<ruby>近<rt>ちか</rt></ruby>いです。</div><div class=\"cn-text\">而且这间比三鹰的房间离车站更近。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"2\"><div class=\"speaker\">AGENT</div><div class=\"jp-text\">ええ。それに、この<ruby>部屋<rt>へや</rt></ruby>は３つの<ruby>中<rt>なか</rt></ruby>でいちばん<ruby>新<rt>あたら</rt></ruby>しくてきれいですよ。</div><div class=\"cn-text\">是的。而且这间房在三间当中是最新最干净的。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"3\"><div class=\"speaker\">AGENT</div><div class=\"jp-text\">スーパーもコンビニも<ruby>近<rt>ちか</rt></ruby>いからいいと<ruby>思<rt>おも</rt></ruby>います。</div><div class=\"cn-text\">超市和便利店也很近，我觉得很不错。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"4\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">じゃあ、この<ruby>部屋<rt>へや</rt></ruby>を<ruby>見<rt>み</rt></ruby>せてください。</div><div class=\"cn-text\">那请让我看看这间房吧。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"5\"><div class=\"speaker\">AGENT</div><div class=\"jp-text\">わかりました。<ruby>今<rt>いま</rt></ruby>、<ruby>時間<rt>じかん</rt></ruby>がありますか。</div><div class=\"cn-text\">好的。您现在有时间吗？</div></div>\n    <div class=\"dialogue-line\" data-idx=\"6\"><div class=\"speaker\">YOSHIDA</div><div class=\"jp-text\">はい。</div><div class=\"cn-text\">有。</div></div>\n    <div class=\"dialogue-line\" data-idx=\"7\"><div class=\"speaker\">AGENT</div><div class=\"jp-text\">では、<ruby>大家<rt>おおや</rt></ruby>さんに<ruby>連絡<rt>れんらく</rt></ruby>します。</div><div class=\"cn-text\">那我联系房东。</div></div>","grammarHTML":"<div class=\"grammar-card\"><div class=\"grammar-jp\">～は～が<ruby>広<rt>ひろ</rt></ruby>いです。</div><div class=\"grammar-cn\">～的～很宽敞。</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～より～です。</div><div class=\"grammar-cn\">比～更～。</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～の<ruby>中<rt>なか</rt></ruby>でいちばん～です。</div><div class=\"grammar-cn\">在～当中最～。</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～くて～です。</div><div class=\"grammar-cn\">又～又～（形容词连接）。</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～も～も～です。</div><div class=\"grammar-cn\">～和～都～。</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～を<ruby>見<rt>み</rt></ruby>せてください。</div><div class=\"grammar-cn\">请给我看看～。</div></div>\n    <div class=\"grammar-card\"><div class=\"grammar-jp\">～に<ruby>連絡<rt>れんらく</rt></ruby>します。</div><div class=\"grammar-cn\">联系～。</div></div>","ts":"3.4,7.2,12.1,18.1,21.6,24.3,27.6,28.4"}];

  var a = document.getElementById('audio'),
      bp = document.getElementById('btnPlay'),
      pb = document.getElementById('progressBar'),
      pf = document.getElementById('progressFill'),
      tc = document.getElementById('timeCurrent'),
      td = document.getElementById('timeDuration'),
      bl = document.getElementById('btnLoop'),
      ba = document.getElementById('btnAB'),
      ar = document.getElementById('abRegion'),
      ma = document.getElementById('markerA'),
      mb = document.getElementById('markerB'),
      lc = document.getElementById('loopCount'),
      br = document.getElementById('btnRuby'),
      bc = document.getElementById('btnCN'),
      bt = document.getElementById('btnTheme'),
      bm = document.getElementById('btnMenu'),
      sb = document.getElementById('sidebar'),
      ol = document.getElementById('overlay'),
      bprev = document.getElementById('btnPrev'),
      bnext = document.getElementById('btnNext');

  // Theme
  var theme = localStorage.getItem('jp-study-theme') || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  function applyTheme() { document.documentElement.setAttribute('data-theme', theme); bt.textContent = theme === 'dark' ? 'LIGHT' : 'DARK'; }
  applyTheme();
  bt.onclick = function() { theme = theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('jp-study-theme', theme); applyTheme(); };

  // Sidebar toggle (mobile)
  bm.onclick = function() { sb.classList.toggle('open'); ol.classList.toggle('open'); };
  ol.onclick = function() { sb.classList.remove('open'); ol.classList.remove('open'); };

  // State
  var currentIdx = 0, ts = [], prevCur = -2, cnt = 0, SK = '';
  var abOn = false, pA = null, pB = null, drag = false;
  var loopOn = localStorage.getItem('jp-study-loop') !== 'false';
  bl.classList.toggle('active', loopOn);
  var initSpd = +(localStorage.getItem('jp-study-speed') || 1);
  a.playbackRate = initSpd;
  document.querySelectorAll('.btn-speed').forEach(function(b) { b.classList.toggle('active', parseFloat(b.dataset.speed) === initSpd); });
  if (localStorage.getItem('jp-study-hide-ruby') === 'true') { document.body.classList.add('hide-ruby'); br.classList.remove('active'); }
  if (localStorage.getItem('jp-study-hide-cn') === 'true') { document.body.classList.add('hide-cn'); bc.classList.remove('active'); }

  function fmt(s) { if (!isFinite(s)) return '0:00'; return Math.floor(s / 60) + ':' + ('0' + Math.floor(s % 60)).slice(-2); }

  function loadLesson(idx) {
    if (idx < 0 || idx >= LESSONS.length) return;
    a.pause();
    currentIdx = idx;
    var L = LESSONS[idx];
    document.getElementById('lessonTag').textContent = L.tag;
    document.getElementById('lessonTitle').textContent = L.title;
    document.getElementById('lessonMeta').textContent = L.meta;
    document.getElementById('dialogueContent').innerHTML = L.dialogueHTML;
    document.getElementById('grammarContent').innerHTML = L.grammarHTML;
    a.src = L.id + '/' + L.audioFile;
    a.load();
    ts = L.ts.split(',').map(Number);
    SK = 'jp-study-plays-' + L.audioFile;
    cnt = +(localStorage.getItem(SK) || 0);
    lc.textContent = cnt;
    pf.style.width = '0%';
    tc.textContent = '0:00';
    td.textContent = '0:00';
    bp.innerHTML = '&#9654;';
    abOn = false; pA = pB = null; prevCur = -2;
    ba.classList.remove('active');
    ma.style.display = mb.style.display = ar.style.display = 'none';

    // Update nav highlight
    document.querySelectorAll('.nav-item').forEach(function(n) {
      n.classList.toggle('active', n.dataset.lesson === L.id);
    });
    // Scroll nav item into view
    var activeNav = document.querySelector('.nav-item.active');
    if (activeNav) activeNav.scrollIntoView({ block: 'nearest' });

    // Update prev/next
    bprev.disabled = idx === 0;
    bnext.disabled = idx === LESSONS.length - 1;

    // Bind click-to-seek on new dialogue lines
    bindDialogueClicks();

    // Save last lesson
    localStorage.setItem('jp-study-last-lesson', L.id);

    // Close mobile sidebar
    sb.classList.remove('open'); ol.classList.remove('open');

    // Scroll to top
    window.scrollTo({ top: 0 });

    // Apply speed
    a.playbackRate = +(localStorage.getItem('jp-study-speed') || 1);
  }

  function bindDialogueClicks() {
    document.querySelectorAll('#dialogueContent .dialogue-line[data-idx]').forEach(function(l) {
      l.onclick = function() {
        var idx = +l.dataset.idx;
        if (ts[idx] !== undefined) { a.currentTime = ts[idx]; if (a.paused) a.play(); }
      };
    });
  }

  // Player controls
  bp.onclick = function() { a.paused ? a.play() : a.pause(); };
  a.onplay = function() { bp.innerHTML = '&#10074;&#10074;'; };
  a.onpause = function() { bp.innerHTML = '&#9654;'; };
  a.onended = function() {
    cnt++; localStorage.setItem(SK, cnt); lc.textContent = cnt;
    if (loopOn) { a.currentTime = 0; a.play(); }
    else if (abOn && pA !== null && pB !== null) { a.currentTime = pA; a.play(); }
  };
  a.onloadedmetadata = function() { td.textContent = fmt(a.duration); };
  a.ontimeupdate = function() {
    if (!a.duration) return;
    pf.style.width = (a.currentTime / a.duration * 100) + '%';
    tc.textContent = fmt(a.currentTime);
    if (abOn && pA !== null && pB !== null && a.currentTime >= pB) {
      a.currentTime = pA; cnt++; localStorage.setItem(SK, cnt); lc.textContent = cnt;
    }
    hlLine();
  };

  function ratio(e) { var r = pb.getBoundingClientRect(); return Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)); }
  pb.onmousedown = function(e) { if (abOn) { hab(e); return; } drag = true; if (a.duration) a.currentTime = ratio(e) * a.duration; };
  pb.ontouchstart = function(e) { if (abOn) { hab(e.touches[0]); return; } drag = true; if (a.duration) a.currentTime = ratio(e.touches[0]) * a.duration; };
  document.onmousemove = function(e) { if (drag && a.duration) a.currentTime = ratio(e) * a.duration; };
  document.ontouchmove = function(e) { if (drag && a.duration) a.currentTime = ratio(e.touches[0]) * a.duration; };
  document.onmouseup = function() { drag = false; };
  document.ontouchend = function() { drag = false; };

  function hab(e) {
    if (!a.duration) return; var r = ratio(e), t = r * a.duration;
    if (pA === null) { pA = t; ma.style.left = r * 100 + '%'; ma.style.display = 'block'; }
    else if (pB === null) {
      pB = t; if (pB < pA) { var tmp = pA; pA = pB; pB = tmp; }
      var aR = pA / a.duration * 100, bR = pB / a.duration * 100;
      ma.style.left = aR + '%'; mb.style.left = bR + '%'; mb.style.display = 'block';
      ar.style.left = aR + '%'; ar.style.width = (bR - aR) + '%'; ar.style.display = 'block';
      a.currentTime = pA; if (a.paused) a.play();
    } else { cab(); }
  }
  function cab() { pA = pB = null; ma.style.display = mb.style.display = ar.style.display = 'none'; }

  document.querySelectorAll('.btn-speed').forEach(function(b) {
    b.onclick = function() {
      document.querySelectorAll('.btn-speed').forEach(function(x) { x.classList.remove('active'); });
      b.classList.add('active'); a.playbackRate = parseFloat(b.dataset.speed);
      localStorage.setItem('jp-study-speed', b.dataset.speed);
    };
  });
  bl.onclick = function() { loopOn = !loopOn; bl.classList.toggle('active', loopOn); localStorage.setItem('jp-study-loop', loopOn); };
  ba.onclick = function() { abOn = !abOn; ba.classList.toggle('active', abOn); if (!abOn) cab(); };
  br.onclick = function() { document.body.classList.toggle('hide-ruby'); br.classList.toggle('active', !document.body.classList.contains('hide-ruby')); localStorage.setItem('jp-study-hide-ruby', document.body.classList.contains('hide-ruby')); };
  bc.onclick = function() { document.body.classList.toggle('hide-cn'); bc.classList.toggle('active', !document.body.classList.contains('hide-cn')); localStorage.setItem('jp-study-hide-cn', document.body.classList.contains('hide-cn')); };

  // Sync highlight
  function hlLine() {
    var lines = document.querySelectorAll('#dialogueContent .dialogue-line[data-idx]');
    var t = a.currentTime, cur = -1;
    for (var i = ts.length - 1; i >= 0; i--) { if (t >= ts[i]) { cur = i; break; } }
    lines.forEach(function(l, i) { l.classList.toggle('active', i === cur); });
    if (cur !== prevCur) {
      prevCur = cur;
      if (cur <= 0) { window.scrollTo({ top: 0, behavior: 'smooth' }); }
      else if (lines[cur]) {
        var r = lines[cur].getBoundingClientRect();
        if (r.top < 0 || r.bottom > window.innerHeight)
          lines[cur].scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }
  }

  // Nav clicks
  document.querySelectorAll('.nav-item').forEach(function(n, i) {
    n.onclick = function() { loadLesson(i); };
  });

  // Prev/Next
  bprev.onclick = function() { loadLesson(currentIdx - 1); };
  bnext.onclick = function() { loadLesson(currentIdx + 1); };

  // Keyboard
  document.onkeydown = function(e) {
    if (e.code === 'Space') { e.preventDefault(); a.paused ? a.play() : a.pause(); }
    else if (e.code === 'ArrowLeft' && e.altKey) { e.preventDefault(); loadLesson(currentIdx - 1); }
    else if (e.code === 'ArrowRight' && e.altKey) { e.preventDefault(); loadLesson(currentIdx + 1); }
  };

  // Init: load last lesson or first
  var lastId = localStorage.getItem('jp-study-last-lesson');
  var startIdx = 0;
  if (lastId) {
    var found = LESSONS.findIndex(function(l) { return l.id === lastId; });
    if (found >= 0) startIdx = found;
  }
  loadLesson(startIdx);
})();
</script>
</body>
</html>
